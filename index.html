<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDOS - Lumbridge</title>
<link rel="stylesheet" href="css/ui.css">
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas"></canvas>
  
  <!-- OSRS-style UI overlay -->
  <div id="ui-overlay">
    <!-- Top bar -->
    <div id="top-bar">
      <div id="minimap-container">
        <canvas id="minimap" width="160" height="160"></canvas>
        <div id="compass">N</div>
      </div>
    </div>

    <!-- Chat box -->
    <div id="chatbox">
      <div id="chat-tabs">
        <button class="chat-tab active" data-tab="all">All</button>
        <button class="chat-tab" data-tab="game">Game</button>
        <button class="chat-tab" data-tab="public">Public</button>
        <button class="chat-tab" data-tab="private">Private</button>
        <button class="chat-tab" data-tab="clan">Clan</button>
        <button class="chat-tab" data-tab="trade">Trade</button>
      </div>
      <div id="chat-messages"></div>
      <input id="chat-input" type="text" placeholder="Press Enter to chat..." />
    </div>

    <!-- Right panel: inventory/skills/etc -->
    <div id="right-panel">
      <div id="panel-tabs">
        <button class="panel-tab active" data-panel="inventory" title="Inventory">🎒</button>
        <button class="panel-tab" data-panel="skills" title="Skills">⚔️</button>
        <button class="panel-tab" data-panel="equipment" title="Equipment">🛡️</button>
        <button class="panel-tab" data-panel="prayer" title="Prayer">🙏</button>
      </div>
      <div id="panel-content">
        <div id="inventory-panel" class="panel active">
          <div id="inventory-grid"></div>
        </div>
        <div id="skills-panel" class="panel">
          <div id="skills-list"></div>
        </div>
        <div id="equipment-panel" class="panel">
          <div id="equipment-slots"></div>
        </div>
        <div id="prayer-panel" class="panel">
          <p style="color:#ff0;text-align:center;padding:20px;">Coming soon...</p>
        </div>
      </div>
    </div>

    <!-- XP drops -->
    <div id="xp-drops"></div>

    <!-- Health/prayer bars -->
    <div id="status-orbs">
      <div class="orb" id="hp-orb"><span id="hp-text">10</span><div class="orb-fill hp-fill"></div></div>
      <div class="orb" id="prayer-orb"><span id="prayer-text">1</span><div class="orb-fill prayer-fill"></div></div>
      <div class="orb" id="run-orb"><span id="run-text">100</span><div class="orb-fill run-fill"></div></div>
    </div>

    <!-- Right-click context menu -->
    <div id="context-menu" class="hidden">
      <ul id="context-options"></ul>
    </div>

    <!-- NPC dialog -->
    <div id="npc-dialog" class="hidden">
      <div id="npc-dialog-name"></div>
      <div id="npc-dialog-text"></div>
      <div id="npc-dialog-options"></div>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div id="loading-content">
      <h1>HDOS</h1>
      <p>Loading Lumbridge...</p>
      <div id="loading-bar-container">
        <div id="loading-bar"></div>
      </div>
      <p id="loading-status">Initializing...</p>
    </div>
  </div>
</div>

<!-- Three.js and addons from CDN -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module" src="js/main.js"></script>
</body>
</html>
