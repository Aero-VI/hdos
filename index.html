<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDOS - Lumbridge</title>
<style>
/* HDOS UI - OSRS Style */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
#game-container { position: relative; width: 100vw; height: 100vh; }
#game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
#ui-overlay > * { pointer-events: auto; }

/* Loading screen */
#loading-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #1a0a00; display: flex; align-items: center; justify-content: center;
  z-index: 1000; transition: opacity 0.8s;
}
#loading-screen.hidden { opacity: 0; pointer-events: none; }
#loading-content { text-align: center; color: #ffd700; }
#loading-content h1 { font-size: 48px; text-shadow: 0 0 20px #ff6600; margin-bottom: 10px; letter-spacing: 8px; }
#loading-content .subtitle { font-size: 14px; color: #8b7530; margin-bottom: 20px; font-style: italic; }
#loading-bar-container { width: 350px; height: 22px; border: 2px solid #5c4a1e; border-radius: 4px; margin: 15px auto; background: #1a0f00; }
#loading-bar { height: 100%; width: 0%; background: linear-gradient(to right, #8b6914, #ffd700); border-radius: 2px; transition: width 0.3s; }
#loading-status { font-size: 12px; color: #8b7530; margin-top: 10px; }
#loading-pct { font-size: 11px; color: #5c4a1e; margin-top: 5px; }

/* ====== 9-SLICE STONE BORDER (FIX #7) ====== */
/* We generate a stone-border via CSS gradients + border-image-like technique */
.stone-border {
  border: 4px solid #5c4a1e;
  border-image: repeating-linear-gradient(
    90deg,
    #3a2a10 0px, #5c4a1e 2px, #8b7530 4px, #5c4a1e 6px, #3a2a10 8px
  ) 4;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.5), 0 0 4px rgba(0,0,0,0.8);
}

/* Minimap */
#minimap-container {
  position: fixed; top: 5px; right: 5px;
  width: 164px; height: 164px;
  border: 3px solid #5c4a1e; border-radius: 50%;
  overflow: hidden; background: #0a1a0a;
  box-shadow: 0 0 6px rgba(0,0,0,0.8), inset 0 0 4px rgba(0,0,0,0.5);
}
#minimap { width: 100%; height: 100%; border-radius: 50%; }
#compass {
  position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
  color: #ffd700; font-weight: bold; font-size: 12px;
  text-shadow: 1px 1px 0px #000; /* FIX #8 */
}

/* Status orbs */
#status-orbs {
  position: fixed; top: 175px; right: 145px;
  display: flex; flex-direction: column; gap: 5px;
}
.orb {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid #5c4a1e; background: #1a0a00;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  box-shadow: 0 0 3px rgba(0,0,0,0.6);
}
.orb span { position: relative; z-index: 2; color: #fff; font-size: 11px; font-weight: bold; text-shadow: 1px 1px 0px #000; }
.orb-fill { position: absolute; bottom: 0; width: 100%; transition: height 0.3s; }
.hp-fill { background: rgba(200,0,0,0.5); height: 100%; }
.prayer-fill { background: rgba(0,150,200,0.5); height: 100%; }
.run-fill { background: rgba(200,170,0,0.5); height: 100%; }

/* Chat box — FIX #7: 9-slice stone border */
#chatbox {
  position: fixed; bottom: 0; left: 0; width: 500px; height: 160px;
  background: rgba(0,0,0,0.85);
  border: 4px solid #5c4a1e;
  border-bottom: none; border-left: none;
  border-image: repeating-linear-gradient(
    90deg,
    #3a2a10 0px, #5c4a1e 2px, #8b7530 4px, #5c4a1e 6px, #3a2a10 8px
  ) 4;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.5), 0 0 4px rgba(0,0,0,0.8);
}
#chat-tabs { display: flex; background: #2a1a00; border-bottom: 1px solid #5c4a1e; }
.chat-tab {
  flex: 1; padding: 4px 2px; background: none; border: none;
  color: #cba135; font-size: 11px; cursor: pointer; transition: 0.2s;
  text-shadow: 1px 1px 0px #000; /* FIX #8 */
}
.chat-tab:hover, .chat-tab.active { color: #ffd700; background: rgba(255,215,0,0.1); }
#chat-messages {
  height: 110px; overflow-y: auto; padding: 5px 8px;
  font-size: 12px; color: #fff; scrollbar-width: thin; scrollbar-color: #5c4a1e transparent;
}
#chat-messages .msg { margin: 1px 0; line-height: 1.4; text-shadow: 1px 1px 0px #000; /* FIX #8 */ }
#chat-messages .msg-game { color: #5882ff; }
#chat-messages .msg-public { color: #fff; }
#chat-messages .msg-npc { color: #ff0; }
#chat-messages .msg-system { color: #ff3333; }
#chat-messages .msg-trade { color: #8040ff; }
#chat-input {
  width: 100%; padding: 4px 8px; background: #1a0f00;
  border: none; border-top: 1px solid #5c4a1e;
  color: #fff; font-size: 12px; outline: none;
  text-shadow: 1px 1px 0px #000; /* FIX #8 */
}

/* Right panel — FIX #7: 9-slice stone border */
#right-panel {
  position: fixed; top: 175px; right: 0; width: 205px;
  background: rgba(0,0,0,0.85);
  border: 4px solid #5c4a1e;
  border-right: none;
  border-image: repeating-linear-gradient(
    90deg,
    #3a2a10 0px, #5c4a1e 2px, #8b7530 4px, #5c4a1e 6px, #3a2a10 8px
  ) 4;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.5), 0 0 4px rgba(0,0,0,0.8);
}
#panel-tabs { display: flex; background: #2a1a00; border-bottom: 1px solid #5c4a1e; }
.panel-tab {
  flex: 1; padding: 6px; background: none; border: none;
  font-size: 16px; cursor: pointer; filter: grayscale(0.5); transition: 0.2s;
}
.panel-tab:hover, .panel-tab.active { filter: none; background: rgba(255,215,0,0.1); }
#panel-content { padding: 5px; }
.panel { display: none; }
.panel.active { display: block; }
#inventory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
.inv-slot {
  width: 44px; height: 44px; background: rgba(60,40,10,0.6);
  border: 1px solid #5c4a1e; display: flex; align-items: center;
  justify-content: center; font-size: 11px; color: #cba135;
  cursor: pointer; position: relative;
  text-shadow: 1px 1px 0px #000; /* FIX #8 */
}
.inv-slot:hover { background: rgba(100,70,20,0.6); }
.inv-slot .item-count {
  position: absolute; bottom: 1px; right: 2px;
  font-size: 9px; color: #ff0; text-shadow: 1px 1px 0px #000; /* FIX #8 */
}
#skills-list { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.skill-entry {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 5px; background: rgba(60,40,10,0.4);
  border: 1px solid #3a2a0a; font-size: 10px; color: #cba135;
  text-shadow: 1px 1px 0px #000; /* FIX #8 */
}
.skill-entry .skill-icon { font-size: 14px; }
.skill-entry .skill-level { color: #ffd700; font-weight: bold; }

/* XP drops — FIX #8 */
#xp-drops {
  position: fixed; top: 50px; right: 180px; width: 100px;
  pointer-events: none; text-align: right;
}
.xp-drop {
  color: #fff; font-size: 14px; font-weight: bold;
  text-shadow: 1px 1px 0px #000; /* FIX #8 — 1px black, not blur */
  animation: xpFloat 2s ease-out forwards;
}
@keyframes xpFloat {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-60px); }
}

/* Context menu — FIX #7 stone border */
#context-menu {
  position: fixed; background: #2a1a00;
  border: 4px solid #5c4a1e;
  border-image: repeating-linear-gradient(
    90deg,
    #3a2a10 0px, #5c4a1e 2px, #8b7530 4px, #5c4a1e 6px, #3a2a10 8px
  ) 4;
  min-width: 150px; z-index: 100;
  box-shadow: 0 0 6px rgba(0,0,0,0.8);
}
#context-menu.hidden { display: none; }
#context-options { list-style: none; }
#context-options li {
  padding: 4px 12px; color: #cba135; font-size: 12px; cursor: pointer;
  text-shadow: 1px 1px 0px #000; /* FIX #8 */
}
#context-options li:hover { background: rgba(255,215,0,0.15); color: #ffd700; }
#context-options li:first-child { color: #ff0; font-weight: bold; }

/* NPC dialog — FIX #7 stone border */
#npc-dialog {
  position: fixed; bottom: 170px; left: 50%; transform: translateX(-50%);
  width: 420px; background: rgba(0,0,0,0.92);
  border: 4px solid #5c4a1e;
  border-image: repeating-linear-gradient(
    90deg,
    #3a2a10 0px, #5c4a1e 2px, #8b7530 4px, #5c4a1e 6px, #3a2a10 8px
  ) 4;
  padding: 15px; text-align: center; border-radius: 4px;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.5), 0 0 6px rgba(0,0,0,0.8);
}
#npc-dialog.hidden { display: none; }
#npc-dialog-name { color: #ffd700; font-weight: bold; font-size: 14px; margin-bottom: 8px; text-shadow: 1px 1px 0px #000; }
#npc-dialog-text { color: #fff; font-size: 13px; margin-bottom: 12px; line-height: 1.4; text-shadow: 1px 1px 0px #000; }
#npc-dialog-options button {
  margin: 3px; padding: 5px 15px; background: #2a1a00; border: 1px solid #5c4a1e;
  color: #00bfff; cursor: pointer; font-size: 12px;
  text-shadow: 1px 1px 0px #000; /* FIX #8 */
}
#npc-dialog-options button:hover { background: #3a2a10; color: #fff; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #5c4a1e; border-radius: 3px; }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas"></canvas>
  <div id="ui-overlay">
    <div id="top-bar">
      <div id="minimap-container">
        <canvas id="minimap" width="160" height="160"></canvas>
        <div id="compass">N</div>
      </div>
    </div>
    <div id="chatbox">
      <div id="chat-tabs">
        <button class="chat-tab active" data-tab="all">All</button>
        <button class="chat-tab" data-tab="game">Game</button>
        <button class="chat-tab" data-tab="public">Public</button>
        <button class="chat-tab" data-tab="private">Private</button>
        <button class="chat-tab" data-tab="clan">Clan</button>
        <button class="chat-tab" data-tab="trade">Trade</button>
      </div>
      <div id="chat-messages"></div>
      <input id="chat-input" type="text" placeholder="Press Enter to chat..." />
    </div>
    <div id="right-panel">
      <div id="panel-tabs">
        <button class="panel-tab active" data-panel="inventory" title="Inventory">🎒</button>
        <button class="panel-tab" data-panel="skills" title="Skills">⚔️</button>
        <button class="panel-tab" data-panel="equipment" title="Equipment">🛡️</button>
        <button class="panel-tab" data-panel="prayer" title="Prayer">🙏</button>
      </div>
      <div id="panel-content">
        <div id="inventory-panel" class="panel active"><div id="inventory-grid"></div></div>
        <div id="skills-panel" class="panel"><div id="skills-list"></div></div>
        <div id="equipment-panel" class="panel"><p style="color:#ff0;text-align:center;padding:20px;text-shadow:1px 1px 0px #000;">Coming soon...</p></div>
        <div id="prayer-panel" class="panel"><p style="color:#ff0;text-align:center;padding:20px;text-shadow:1px 1px 0px #000;">Coming soon...</p></div>
      </div>
    </div>
    <div id="xp-drops"></div>
    <div id="status-orbs">
      <div class="orb" id="hp-orb"><span id="hp-text">10</span><div class="orb-fill hp-fill"></div></div>
      <div class="orb" id="prayer-orb"><span id="prayer-text">1</span><div class="orb-fill prayer-fill"></div></div>
      <div class="orb" id="run-orb"><span id="run-text">100</span><div class="orb-fill run-fill"></div></div>
    </div>
    <div id="context-menu" class="hidden"><ul id="context-options"></ul></div>
    <div id="npc-dialog" class="hidden">
      <div id="npc-dialog-name"></div>
      <div id="npc-dialog-text"></div>
      <div id="npc-dialog-options"></div>
    </div>
  </div>
  <div id="loading-screen">
    <div id="loading-content">
      <h1>HDOS</h1>
      <p class="subtitle">HD Old School Client</p>
      <div id="loading-bar-container"><div id="loading-bar"></div></div>
      <p id="loading-status">Initializing engine...</p>
      <p id="loading-pct">0%</p>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/",
    "troika-three-text": "https://cdn.jsdelivr.net/npm/troika-three-text@0.49.1/dist/troika-three-text.esm.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';
import { SSAOPass } from 'three/addons/postprocessing/SSAOPass.js';
import { Sky } from 'three/addons/objects/Sky.js';
import { Water } from 'three/addons/objects/Water.js';
import { Text } from 'troika-three-text';

// ============================================================
//  CONSTANTS
// ============================================================
const MODEL_BASE = 'https://raw.githubusercontent.com/KayKit-Game-Assets/KayKit-Medieval-Hexagon-Pack-1.0/main/addons/kaykit_medieval_hexagon_pack/Assets/gltf/';
const PH = 'https://dl.polyhaven.org/file/ph-assets/Textures/jpg/1k';
const TILE = 2;

// Horizon color for fog — warm hazy tone matching sky gradient at horizon
const HORIZON_COLOR = 0xC8AA78;

// ============================================================
//  LOADING MANAGER
// ============================================================
const loadingScreen = document.getElementById('loading-screen');
const loadingBar = document.getElementById('loading-bar');
const loadingStatus = document.getElementById('loading-status');
const loadingPct = document.getElementById('loading-pct');

let totalAssets = 0, loadedAssets = 0;
function trackAsset() { totalAssets++; }
function assetLoaded(name) {
  loadedAssets++;
  const pct = Math.min(100, Math.round((loadedAssets / Math.max(1, totalAssets)) * 100));
  loadingBar.style.width = pct + '%';
  loadingPct.textContent = pct + '%';
  if (name) loadingStatus.textContent = name;
}

// ============================================================
//  TEXTURES — FIX #11: NearestFilter on ALL textures
// ============================================================
const texLoader = new THREE.TextureLoader();
const texCache = {};

// FIX #11: Apply nearest-neighbor to every texture for crispy OSRS pixel look
function applyNearestFilter(tex) {
  tex.minFilter = THREE.NearestFilter;
  tex.magFilter = THREE.NearestFilter;
  tex.generateMipmaps = false;
  return tex;
}

function loadPBR(name, rx, ry) {
  const key = `${name}_${rx}_${ry}`;
  if (texCache[key]) return texCache[key];
  const cfg = (tex, srgb) => {
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(rx, ry);
    if (srgb) tex.colorSpace = THREE.SRGBColorSpace;
    applyNearestFilter(tex); // FIX #11
    return tex;
  };
  trackAsset(); trackAsset(); trackAsset();
  const result = {
    map: cfg(texLoader.load(`${PH}/${name}/${name}_diff_1k.jpg`, () => assetLoaded(`Texture: ${name} diffuse`)), true),
    normalMap: cfg(texLoader.load(`${PH}/${name}/${name}_nor_gl_1k.jpg`, () => assetLoaded(`Texture: ${name} normal`))),
    roughnessMap: cfg(texLoader.load(`${PH}/${name}/${name}_rough_1k.jpg`, () => assetLoaded(`Texture: ${name} rough`))),
  };
  texCache[key] = result;
  return result;
}

// Load a single diffuse texture with nearest filtering
function loadDiffuse(url, rx, ry) {
  trackAsset();
  const tex = texLoader.load(url, () => assetLoaded(`Texture: ${url.split('/').pop()}`));
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(rx, ry);
  tex.colorSpace = THREE.SRGBColorSpace;
  applyNearestFilter(tex); // FIX #11
  return tex;
}

function makeMat(texSet, extras = {}) {
  return new THREE.MeshStandardMaterial({
    map: texSet.map, normalMap: texSet.normalMap,
    normalScale: new THREE.Vector2(0.8, 0.8),
    roughnessMap: texSet.roughnessMap, ...extras,
  });
}

function colorMat(color, roughness = 0.85, metalness = 0.0) {
  return new THREE.MeshStandardMaterial({ color, roughness, metalness });
}

const TEX = {
  grass: (rx=30,ry=30) => loadPBR('forrest_ground_01',rx,ry),
  cobble: (rx=6,ry=6) => loadPBR('cobblestone_floor_08',rx,ry),
  stone: (rx=2,ry=2) => loadPBR('medieval_blocks_05',rx,ry),
  dirt: (rx=8,ry=8) => loadPBR('brown_mud_02',rx,ry),
  wood: (rx=2,ry=2) => loadPBR('wood_planks_dirty',rx,ry),
};

// ============================================================
//  RENDERER — FIX #5: Soft Shadows (PCFSoftShadowMap, 2048x2048)
// ============================================================
const canvas = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap; // FIX #5
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();

// FIX #1: EXP2 Fog — color matches horizon, density 0.015
scene.fog = new THREE.FogExp2(HORIZON_COLOR, 0.015);

// ============================================================
//  CAMERA
// ============================================================
const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.5, 500);
const camState = {
  distance: 35, angle: 0, pitch: 55,
  targetPos: new THREE.Vector3(0, 0, 15),
  minPitch: 20, maxPitch: 80, minDist: 12, maxDist: 70,
};

function updateCamera() {
  const pr = THREE.MathUtils.degToRad(camState.pitch);
  const ar = camState.angle;
  const d = camState.distance;
  camera.position.set(
    camState.targetPos.x + Math.sin(ar) * Math.cos(pr) * d,
    camState.targetPos.y + Math.sin(pr) * d,
    camState.targetPos.z + Math.cos(ar) * Math.cos(pr) * d
  );
  camera.lookAt(camState.targetPos);
}

// ============================================================
//  LIGHTING — FIX #5: Ambient light UP for soft blue-grey shadows
// ============================================================
// Hemisphere light cranked up so shadows are soft, not pitch black
const hemiLight = new THREE.HemisphereLight(0xC8AA78, 0x667788, 1.0); // FIX #5: increased from 0.6
scene.add(hemiLight);

// Ambient light for fill — prevents pitch-black shadows
const ambientLight = new THREE.AmbientLight(0x889EBB, 0.35); // FIX #5: blue-grey ambient
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xFFDDBB, 1.8);
sunLight.position.set(40, 60, 30);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;  // FIX #5
sunLight.shadow.mapSize.height = 2048; // FIX #5
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 200;
sunLight.shadow.camera.left = -80;
sunLight.shadow.camera.right = 80;
sunLight.shadow.camera.top = 80;
sunLight.shadow.camera.bottom = -80;
sunLight.shadow.bias = -0.001;
sunLight.shadow.normalBias = 0.02;
scene.add(sunLight);
scene.add(sunLight.target);

const fillLight = new THREE.DirectionalLight(0x8899BB, 0.4);
fillLight.position.set(-30, 20, -40);
scene.add(fillLight);

// ============================================================
//  SKY — FIX #10: Gradient sky dome, hazy warm tones
// ============================================================
const sky = new Sky();
sky.scale.setScalar(10000);
scene.add(sky);
const skyU = sky.material.uniforms;
skyU['turbidity'].value = 4;
skyU['rayleigh'].value = 1.5;
skyU['mieCoefficient'].value = 0.005;
skyU['mieDirectionalG'].value = 0.8;
const sunPos = new THREE.Vector3();
const phi = THREE.MathUtils.degToRad(90 - 35);
const theta = THREE.MathUtils.degToRad(220);
sunPos.setFromSphericalCoords(1, phi, theta);
skyU['sunPosition'].value.copy(sunPos);
sunLight.position.copy(sunPos).multiplyScalar(60);

// ============================================================
//  POST-PROCESSING — FIX #4: SSAO, FIX #6: Subtle Bloom
// ============================================================
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

// FIX #4: SSAO — #1 priority, makes objects feel grounded
const ssaoPass = new SSAOPass(scene, camera, window.innerWidth, window.innerHeight);
ssaoPass.kernelRadius = 12;
ssaoPass.minDistance = 0.001;
ssaoPass.maxDistance = 0.15;
ssaoPass.output = SSAOPass.OUTPUT.Default;
composer.addPass(ssaoPass);

// FIX #6: Subtle Bloom — low strength, just enough for fire/neon pop
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.12,  // strength: 0.1-0.15 range
  0.4,   // radius
  0.85   // threshold
);
composer.addPass(bloomPass);

composer.addPass(new SMAAPass(window.innerWidth, window.innerHeight));

// ============================================================
//  TERRAIN HEIGHT
// ============================================================
function terrainHeight(wx, wz) {
  const riverDist = Math.abs(wx - 20);
  let riverDip = 0;
  if (riverDist < 16) riverDip = -1.5 * (1 - riverDist / 16);
  const hill = Math.sin(wx * 0.015) * Math.cos(wz * 0.012) * 2.0
    + Math.sin(wx * 0.035 + 1) * Math.sin(wz * 0.028) * 1.0
    + Math.cos(wx * 0.008 + wz * 0.006) * 3.0;
  const castleDist = Math.sqrt(wx * wx + wz * wz);
  const castleFlat = Math.max(0, 1 - castleDist / 40);
  const southRise = Math.max(0, wz * 0.005);
  return (hill + riverDip + southRise) * (1 - castleFlat * 0.8);
}

// ============================================================
//  TERRAIN — FIX #2: Custom GLSL Texture Splatting ShaderMaterial
// ============================================================
function createTerrainSplatMaterial() {
  // Load 3 Poly Haven textures for splatting
  const grassTex = loadDiffuse(`${PH}/forrest_ground_01/forrest_ground_01_diff_1k.jpg`, 1, 1);
  const dirtTex = loadDiffuse(`${PH}/brown_mud_02/brown_mud_02_diff_1k.jpg`, 1, 1);
  const stoneTex = loadDiffuse(`${PH}/medieval_blocks_05/medieval_blocks_05_diff_1k.jpg`, 1, 1);

  const splatVertexShader = `
    varying vec2 vUv;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    void main() {
      vUv = uv;
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPos = worldPos.xyz;
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
  `;

  const splatFragmentShader = `
    uniform sampler2D uGrass;
    uniform sampler2D uDirt;
    uniform sampler2D uStone;
    uniform float uTexScale;

    varying vec2 vUv;
    varying vec3 vWorldPos;
    varying vec3 vNormal;

    // Simple hash for procedural noise
    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }

    void main() {
      vec2 texCoord = vWorldPos.xz * uTexScale;

      vec4 grassCol = texture2D(uGrass, texCoord);
      vec4 dirtCol = texture2D(uDirt, texCoord);
      vec4 stoneCol = texture2D(uStone, texCoord);

      // Procedural blend weights based on world position
      float n1 = noise(vWorldPos.xz * 0.08);
      float n2 = noise(vWorldPos.xz * 0.15 + 50.0);

      // Path detection: dirt along main roads (X≈0, Z axis and Z≈0, X axis)
      float pathX = 1.0 - smoothstep(0.0, 4.0, abs(vWorldPos.x));
      float pathZ = 1.0 - smoothstep(0.0, 4.0, abs(vWorldPos.z));
      float pathBridge = 1.0 - smoothstep(0.0, 4.0, abs(vWorldPos.x - 10.0)) * smoothstep(-15.0, -5.0, vWorldPos.z);
      float pathAmount = clamp(max(max(pathX, pathZ), pathBridge) + n2 * 0.2, 0.0, 1.0);

      // Building proximity: stone near castle center and buildings
      float castleDist = length(vWorldPos.xz);
      float stoneAmount = (1.0 - smoothstep(5.0, 18.0, castleDist)) * 0.7;

      // Church area
      float churchDist = length(vWorldPos.xz - vec2(12.0, -20.0));
      stoneAmount += (1.0 - smoothstep(3.0, 10.0, churchDist)) * 0.5;

      // Maid cafe area
      float cafeDist = length(vWorldPos.xz - vec2(-18.0, -22.0));
      stoneAmount += (1.0 - smoothstep(3.0, 8.0, cafeDist)) * 0.4;

      // Add noise variation
      stoneAmount = clamp(stoneAmount + n1 * 0.15, 0.0, 1.0);
      pathAmount = clamp(pathAmount, 0.0, 1.0);

      // Final blend: grass base, add dirt for paths, stone near buildings
      float grassWeight = clamp(1.0 - pathAmount - stoneAmount, 0.0, 1.0);
      float dirtWeight = pathAmount * (1.0 - stoneAmount * 0.5);
      float stoneWeight = stoneAmount;

      // Normalize
      float totalW = grassWeight + dirtWeight + stoneWeight;
      grassWeight /= totalW;
      dirtWeight /= totalW;
      stoneWeight /= totalW;

      vec4 finalColor = grassCol * grassWeight + dirtCol * dirtWeight + stoneCol * stoneWeight;

      // Simple directional lighting
      vec3 lightDir = normalize(vec3(0.5, 0.8, 0.3));
      float diff = max(dot(vNormal, lightDir), 0.0) * 0.6 + 0.4;
      finalColor.rgb *= diff;

      gl_FragColor = finalColor;
    }
  `;

  return new THREE.ShaderMaterial({
    uniforms: {
      uGrass: { value: grassTex },
      uDirt: { value: dirtTex },
      uStone: { value: stoneTex },
      uTexScale: { value: 0.15 }, // Controls texture tiling density
    },
    vertexShader: splatVertexShader,
    fragmentShader: splatFragmentShader,
  });
}

function createTerrain() {
  const SIZE = 128;
  const geo = new THREE.PlaneGeometry(SIZE * TILE, SIZE * TILE, SIZE, SIZE);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setY(i, terrainHeight(pos.getX(i), pos.getZ(i)));
  }
  geo.computeVertexNormals();

  // FIX #2: Custom GLSL splatted terrain material
  const mat = createTerrainSplatMaterial();
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  mesh.name = 'terrain';
  scene.add(mesh);

  // Cobblestone paths (still overlay for depth)
  createPath(0, -25 * TILE, 3 * TILE, 50 * TILE, 3, 50);
  createPath(0, 0, 40 * TILE, 3 * TILE, 40, 3);
  createPath(10, -5 * TILE, 14 * TILE, 3 * TILE, 14, 3);

  return mesh;
}

function createPath(cx, cz, w, d, rx, ry) {
  const geo = new THREE.PlaneGeometry(w, d, Math.ceil(rx), Math.ceil(ry));
  geo.rotateX(-Math.PI / 2);
  const p = geo.attributes.position;
  for (let i = 0; i < p.count; i++) {
    p.setY(i, terrainHeight(p.getX(i) + cx, p.getZ(i) + cz) + 0.08);
  }
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, makeMat(TEX.cobble(rx, ry)));
  mesh.position.set(cx, 0, cz);
  mesh.receiveShadow = true;
  scene.add(mesh);
}

// ============================================================
//  GLTF MODEL LOADER — FIX #11: NearestFilter on model textures
// ============================================================
const gltfLoader = new GLTFLoader();
const loadedModels = {};

function loadModel(path, name) {
  return new Promise((resolve) => {
    trackAsset();
    loadingStatus.textContent = `Loading: ${name}...`;
    gltfLoader.load(MODEL_BASE + path, (gltf) => {
      const model = gltf.scene;
      model.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          // FIX #11: Apply NearestFilter to all model textures
          if (child.material) {
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach(mat => {
              ['map','normalMap','roughnessMap','metalnessMap','emissiveMap','aoMap'].forEach(prop => {
                if (mat[prop]) applyNearestFilter(mat[prop]);
              });
            });
          }
        }
      });
      loadedModels[name] = model;
      assetLoaded(`Model: ${name}`);
      resolve(model);
    }, undefined, (err) => {
      console.warn(`Failed to load ${name}:`, err);
      assetLoaded(`Model: ${name} (failed)`);
      resolve(null);
    });
  });
}

}

const allTrees = [];

// Create a procedural leaf texture for alpha-clipped planes
function createLeafTexture(color1Hex, color2Hex) {
  const size = 64;
  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const ctx = cv.getContext('2d');

  // Transparent background
  ctx.clearRect(0, 0, size, size);

  // Draw random leaf blobs
  const c1 = new THREE.Color(color1Hex);
  const c2 = new THREE.Color(color2Hex);

  for (let i = 0; i < 30; i++) {
    const x = Math.random() * size;
    const y = Math.random() * size;
    const r = 3 + Math.random() * 8;
    // Distance from center falloff
    const dx = (x - size/2) / (size/2);
    const dy = (y - size/2) / (size/2);
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 0.85) continue; // Clip to roughly circular shape

    const t = Math.random();
    const cr = Math.floor((c1.r * (1-t) + c2.r * t) * 255);
    const cg = Math.floor((c1.g * (1-t) + c2.g * t) * 255);
    const cb = Math.floor((c1.b * (1-t) + c2.b * t) * 255);
    ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
    ctx.beginPath();
    ctx.ellipse(x, y, r, r * 0.7, Math.random() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }

  const tex = new THREE.CanvasTexture(cv);
  applyNearestFilter(tex); // FIX #11
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function createTree(x, z, scale, type) {
  const group = new THREE.Group();
  const y = terrainHeight(x, z);
  const barkMat = colorMat(0x6B4226, 0.9);

  if (type === 'oak') {
    // Trunk
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5*scale,0.8*scale,5*scale,6), barkMat);
    trunk.position.y = 2.5*scale; trunk.castShadow = true; group.add(trunk);

    // FIX #3: Alpha-clipped intersecting planes for foliage
    const leafTex = createLeafTexture(0x355E00, 0x4A7A20);
    const leafMat = new THREE.MeshStandardMaterial({
      map: leafTex,
      alphaTest: 0.5, // FIX #3: Alpha clip
      transparent: false,
      side: THREE.DoubleSide,
      roughness: 0.9,
    });

    const planeSize = 7 * scale;
    const planeGeo = new THREE.PlaneGeometry(planeSize, planeSize);
    // Create 3 intersecting planes at different angles
    for (let i = 0; i < 3; i++) {
      const plane = new THREE.Mesh(planeGeo, leafMat);
      plane.position.y = 6 * scale;
      plane.rotation.y = (i / 3) * Math.PI; // 0°, 60°, 120°
      plane.castShadow = true;
      group.add(plane);
    }
    // One horizontal plane on top
    const topPlane = new THREE.Mesh(planeGeo, leafMat);
    topPlane.position.y = 8 * scale;
    topPlane.rotation.x = -Math.PI / 2;
    topPlane.scale.set(0.8, 0.8, 0.8);
    topPlane.castShadow = true;
    group.add(topPlane);

  } else if (type === 'willow') {
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4*scale,0.7*scale,6*scale,6), barkMat);
    trunk.position.y = 3*scale; trunk.castShadow = true; group.add(trunk);

    // FIX #3: Willow leaf planes (drooping)
    const leafTex = createLeafTexture(0x4A7A20, 0x3A6A10);
    const leafMat = new THREE.MeshStandardMaterial({
      map: leafTex,
      alphaTest: 0.5,
      transparent: false,
      side: THREE.DoubleSide,
      roughness: 0.9,
    });

    const planeSize = 6 * scale;
    const planeGeo = new THREE.PlaneGeometry(planeSize, planeSize * 1.4);
    for (let i = 0; i < 4; i++) {
      const plane = new THREE.Mesh(planeGeo, leafMat);
      plane.position.y = 6 * scale;
      plane.rotation.y = (i / 4) * Math.PI;
      plane.castShadow = true;
      group.add(plane);
    }

    // Hanging vine meshes
    const vineMat = colorMat(0x3A6A10, 0.95);
    for (let i = 0; i < 8; i++) {
      const a = (i/8)*Math.PI*2;
      const vine = new THREE.Mesh(new THREE.BoxGeometry(0.15,3*scale,0.15), vineMat);
      vine.position.set(Math.cos(a)*2.5*scale, 4*scale, Math.sin(a)*2.5*scale); group.add(vine);
    }

  } else if (type === 'dead') {
    const deadMat = colorMat(0x4A3520, 0.95);
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2*scale,0.5*scale,5*scale,5), deadMat);
    trunk.position.y = 2.5*scale; trunk.castShadow = true; group.add(trunk);
    for (let i = 0; i < 4; i++) {
      const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.15,2.5*scale,4), deadMat);
      const a = (i/4)*Math.PI*2;
      branch.position.set(Math.cos(a)*0.8, 3.5*scale+i*0.5, Math.sin(a)*0.8);
      branch.rotation.z = Math.cos(a)*0.6; branch.rotation.x = Math.sin(a)*0.6;
      branch.castShadow = true; group.add(branch);
    }
  } else {
    // Normal tree
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3*scale,0.5*scale,4*scale,6), barkMat);
    trunk.position.y = 2*scale; trunk.castShadow = true; group.add(trunk);

    // FIX #3: Alpha-clipped foliage planes
    const leafColor1 = [0x3A5F0B, 0x4A6F1B, 0x2D4A08][Math.floor(Math.random()*3)];
    const leafTex = createLeafTexture(leafColor1, 0x5A8F2B);
    const leafMat = new THREE.MeshStandardMaterial({
      map: leafTex,
      alphaTest: 0.5,
      transparent: false,
      side: THREE.DoubleSide,
      roughness: 0.9,
    });

    const planeSize = 5 * scale;
    const planeGeo = new THREE.PlaneGeometry(planeSize, planeSize);
    for (let i = 0; i < 3; i++) {
      const plane = new THREE.Mesh(planeGeo, leafMat);
      plane.position.y = 5 * scale;
      plane.rotation.y = (i / 3) * Math.PI + Math.random() * 0.3;
      plane.castShadow = true;
      group.add(plane);
    }
  }

  group.position.set(x, y, z);
  const treeName = type === 'oak' ? 'Oak' : type === 'willow' ? 'Willow' : type === 'dead' ? 'Dead Tree' : 'Tree';
  group.userData = { type: 'tree', treeType: type, interactable: true, name: treeName };
  scene.add(group);
  allTrees.push(group);
  return group;
}

function createHumanoid(opts={}) {
  const group = new THREE.Group();
  const skinMat = colorMat(opts.skin||0xDEB887,0.85);
  const shirtMat = colorMat(opts.shirt||0x3366AA,0.8);
  const pantsMat = colorMat(opts.pants||0x554433,0.85);
  const hairMat = colorMat(opts.hair||0x332211,0.9);

  const head = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.8,0.7), skinMat);
  head.position.y=3.1; head.castShadow=true; group.add(head);
  const hair = new THREE.Mesh(new THREE.BoxGeometry(0.75,0.35,0.75), hairMat);
  hair.position.y=3.55; group.add(hair);
  for (const s of [-0.15,0.15]) {
    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.05), colorMat(0x111111));
    eye.position.set(s,3.15,0.37); group.add(eye);
  }
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9,1.1,0.55), shirtMat);
  torso.position.y=2.15; torso.castShadow=true; group.add(torso);
  for (const s of [-0.6,0.6]) {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.3,1.0,0.3), shirtMat);
    arm.position.set(s,2.1,0); arm.castShadow=true; group.add(arm);
    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.25,0.25), skinMat);
    hand.position.set(s,1.5,0); group.add(hand);
  }
  for (const s of [-0.2,0.2]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.35,1.1,0.4), pantsMat);
    leg.position.set(s,1.05,0); leg.castShadow=true; group.add(leg);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.35,0.15,0.5), colorMat(0x333333,0.9));
    foot.position.set(s,0.45,0.08); group.add(foot);
  }
  return group;
}

class Player {
  constructor() {
    this.group = new THREE.Group();
    this.group.name = 'player';
    this.stats = {
      hp:10,maxHp:10,prayer:1,maxPrayer:1,runEnergy:100,
      attack:1,strength:1,defence:1,hitpoints:10,
      mining:1,woodcutting:1,fishing:1,cooking:1,firemaking:1,
    };
    this.xp = {attack:0,strength:0,defence:0,hitpoints:1154,mining:0,woodcutting:0,fishing:0,cooking:0,firemaking:0};
    this.inventory = new Array(28).fill(null);
    this.inventory[0] = {name:'Bronze Sword',icon:'⚔️',count:1,type:'weapon',attack:2};
    this.inventory[1] = {name:'Bronze Axe',icon:'🪓',count:1,type:'tool'};
    this.inventory[2] = {name:'Bronze Pickaxe',icon:'⛏️',count:1,type:'tool'};
    this.inventory[3] = {name:'Net',icon:'🥅',count:1,type:'tool'};
    this.inventory[4] = {name:'Tinderbox',icon:'🔥',count:1,type:'tool'};
    this.inventory[5] = {name:'Coins',icon:'🪙',count:25,type:'currency'};
    this.moveTarget = null; this.moveSpeed = 6; this.isMoving = false;
    this.combatTarget = null; this.combatCooldown = 0; this.attackSpeed = 2.4;
    this.skillingTarget = null; this.skillingType = null; this.skillingCooldown = 0;
    this._buildModel();
    this.marker = this._createMarker();
    scene.add(this.marker); this.marker.visible = false;
    scene.add(this.group);
  }
  _buildModel() {
    const sk=colorMat(0xDEB887,0.85),sh=colorMat(0x336699,0.8),pa=colorMat(0x554433,0.85);
    const ha=colorMat(0x332211,0.9),bo=colorMat(0x3A2211,0.9);
    const head=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.8,0.7),sk);head.position.y=3.1;head.castShadow=true;this.group.add(head);
    const hair=new THREE.Mesh(new THREE.BoxGeometry(0.75,0.4,0.75),ha);hair.position.y=3.6;this.group.add(hair);
    for(const s of[-0.15,0.15]){const e=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.05),colorMat(0x111111));e.position.set(s,3.15,0.37);this.group.add(e);}
    const torso=new THREE.Mesh(new THREE.BoxGeometry(0.9,1.1,0.55),sh);torso.position.y=2.15;torso.castShadow=true;this.group.add(torso);
    this.leftArm=new THREE.Mesh(new THREE.BoxGeometry(0.3,1.0,0.3),sh);this.leftArm.position.set(-0.6,2.1,0);this.leftArm.castShadow=true;this.group.add(this.leftArm);
    this.rightArm=new THREE.Mesh(new THREE.BoxGeometry(0.3,1.0,0.3),sh);this.rightArm.position.set(0.6,2.1,0);this.rightArm.castShadow=true;this.group.add(this.rightArm);
    for(const s of[-0.6,0.6]){const h=new THREE.Mesh(new THREE.BoxGeometry(0.25,0.25,0.25),sk);h.position.set(s,1.5,0);this.group.add(h);}
    this.leftLeg=new THREE.Mesh(new THREE.BoxGeometry(0.35,1.0,0.4),pa);this.leftLeg.position.set(-0.2,1.05,0);this.leftLeg.castShadow=true;this.group.add(this.leftLeg);
    this.rightLeg=new THREE.Mesh(new THREE.BoxGeometry(0.35,1.0,0.4),pa);this.rightLeg.position.set(0.2,1.05,0);this.rightLeg.castShadow=true;this.group.add(this.rightLeg);
    for(const s of[-0.2,0.2]){const b=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.2,0.5),bo);b.position.set(s,0.5,0.05);this.group.add(b);}
    this.group.position.set(0,0,15);
  }
  _createMarker() {
    const g=new THREE.Group();
    const m=new THREE.MeshBasicMaterial({color:0xFFFF00,transparent:true,opacity:0.8});
    for(let i=0;i<2;i++){const b=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.05,1.2),m);b.rotation.y=(i===0)?Math.PI/4:-Math.PI/4;g.add(b);}
    return g;
  }
  setMoveTarget(point){this.moveTarget=point.clone();this.isMoving=true;this.combatTarget=null;this.skillingTarget=null;this.skillingType=null;this.marker.position.copy(point);this.marker.position.y+=0.15;this.marker.visible=true;}
  setCombatTarget(e){this.combatTarget=e;this.skillingTarget=null;this.skillingType=null;}
  setSkillingTarget(t,type){this.skillingTarget=t;this.skillingType=type;this.combatTarget=null;this.skillingCooldown=0;}
  update(delta,time,cb={}) {
    const h=terrainHeight;
    if(this.isMoving){const w=Math.sin(time*8)*0.4;this.leftLeg.rotation.x=w;this.rightLeg.rotation.x=-w;this.leftArm.rotation.x=-w*0.6;this.rightArm.rotation.x=w*0.6;}
    else{this.leftLeg.rotation.x=0;this.rightLeg.rotation.x=0;this.leftArm.rotation.x=0;this.rightArm.rotation.x=0;}
    if(this.moveTarget){const dx=this.moveTarget.x-this.group.position.x,dz=this.moveTarget.z-this.group.position.z,dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>0.3){const step=Math.min(this.moveSpeed*delta,dist);this.group.position.x+=dx/dist*step;this.group.position.z+=dz/dist*step;this.group.position.y=h(this.group.position.x,this.group.position.z);this.group.rotation.y=Math.atan2(dx,dz);this.isMoving=true;}
      else{this.moveTarget=null;this.isMoving=false;this.marker.visible=false;}}
    if(this.combatTarget&&!this.combatTarget.userData.isDead){const e=this.combatTarget,dx=e.position.x-this.group.position.x,dz=e.position.z-this.group.position.z,dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>2.5){const step=this.moveSpeed*delta;this.group.position.x+=dx/dist*step;this.group.position.z+=dz/dist*step;this.group.position.y=h(this.group.position.x,this.group.position.z);this.group.rotation.y=Math.atan2(dx,dz);this.isMoving=true;this.moveTarget=null;}
      else{this.isMoving=false;this.group.rotation.y=Math.atan2(dx,dz);this.combatCooldown-=delta;
        if(this.combatCooldown<=0){this.combatCooldown=this.attackSpeed;const maxHit=Math.max(1,this.stats.strength);const hit=Math.floor(Math.random()*(maxHit+1));e.userData.hp-=hit;
          this.rightArm.rotation.x=-1.2;setTimeout(()=>{if(this.rightArm)this.rightArm.rotation.x=0;},200);
          if(cb.onHit)cb.onHit(e,hit);
          if(e.userData.hp<=0){e.userData.isDead=true;e.visible=false;this.combatTarget=null;if(cb.onKill)cb.onKill(e);
            setTimeout(()=>{e.userData.hp=e.userData.maxHp;e.userData.isDead=false;e.visible=true;if(e.userData.respawnPos)e.position.copy(e.userData.respawnPos);},10000);}}}}
    else if(this.combatTarget&&this.combatTarget.userData.isDead)this.combatTarget=null;
    if(this.skillingTarget){const t=this.skillingTarget,dx=t.position.x-this.group.position.x,dz=t.position.z-this.group.position.z,dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>3){const step=this.moveSpeed*delta;this.group.position.x+=dx/dist*step;this.group.position.z+=dz/dist*step;this.group.position.y=h(this.group.position.x,this.group.position.z);this.group.rotation.y=Math.atan2(dx,dz);this.isMoving=true;}
      else{this.isMoving=false;this.group.rotation.y=Math.atan2(dx,dz);this.skillingCooldown-=delta;
        if(this.skillingCooldown<=0){this.skillingCooldown=3+Math.random()*2;this.rightArm.rotation.x=-0.8;setTimeout(()=>{if(this.rightArm)this.rightArm.rotation.x=0;},300);
          if(cb.onSkill)cb.onSkill(this.skillingType,t);}}}
  }
  addItem(item){if(item.count){for(let i=0;i<28;i++){if(this.inventory[i]&&this.inventory[i].name===item.name){this.inventory[i].count+=item.count;return true;}}}
    for(let i=0;i<28;i++){if(!this.inventory[i]){this.inventory[i]={...item,count:item.count||1};return true;}}return false;}
  hasItem(name){return this.inventory.some(i=>i&&i.name===name);}
  addXP(skill,amount){this.xp[skill]=(this.xp[skill]||0)+amount;const nl=this.xpToLevel(this.xp[skill]);
    if(nl>this.stats[skill]){this.stats[skill]=nl;if(skill==='hitpoints'){this.stats.maxHp=nl;this.stats.hp=nl;}return{levelUp:true,skill,level:nl};}return{levelUp:false,amount};}
  xpToLevel(xp){let level=1,total=0;for(let l=1;l<99;l++){total+=Math.floor(l+300*Math.pow(2,l/7))/4;if(xp>=total)level=l+1;else break;}return Math.min(level,99);}
}

// ============================================================
//  UI
// ============================================================
class GameUI {
  constructor(player){this.player=player;this.activeTab='all';this.activePanel='inventory';this.messages=[];
    this._setupChatTabs();this._setupPanelTabs();this._setupInventory();this._setupSkills();this._setupChatInput();}
  _setupChatTabs(){document.querySelectorAll('.chat-tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.chat-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');this.activeTab=t.dataset.tab;this._renderMessages();});});}
  _setupPanelTabs(){document.querySelectorAll('.panel-tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.panel-tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));t.classList.add('active');this.activePanel=t.dataset.panel;document.getElementById(`${this.activePanel}-panel`).classList.add('active');if(this.activePanel==='inventory')this.updateInventory();if(this.activePanel==='skills')this.updateSkills();});});}
  _setupChatInput(){const input=document.getElementById('chat-input');input.addEventListener('keydown',e=>{if(e.key==='Enter'&&input.value.trim()){this.addMessage('You',input.value.trim(),'public');input.value='';input.blur();}});
    document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement!==input)input.focus();});}
  _setupInventory(){const grid=document.getElementById('inventory-grid');grid.innerHTML='';
    for(let i=0;i<28;i++){const slot=document.createElement('div');slot.className='inv-slot';slot.dataset.index=i;
      slot.addEventListener('contextmenu',e=>{e.preventDefault();const item=this.player.inventory[i];if(item)this.showContextMenu(e.clientX,e.clientY,[
        {label:`${item.icon} ${item.name}`,action:null,highlight:true},{label:'Use',action:()=>this.useItem(i)},{label:'Drop',action:()=>this.dropItem(i)},
        {label:'Examine',action:()=>this.addMessage('',`${item.name}: A useful item.`,'game')}]);});
      grid.appendChild(slot);}this.updateInventory();}
  _setupSkills(){this.updateSkills();}
  addMessage(sender,text,type='game'){this.messages.push({sender,text,type,time:Date.now()});if(this.messages.length>200)this.messages.shift();this._renderMessages();}
  _renderMessages(){const c=document.getElementById('chat-messages');const f=this.activeTab==='all'?this.messages:this.messages.filter(m=>m.type===this.activeTab);
    c.innerHTML=f.slice(-50).map(m=>{const p=m.sender?`<b>${m.sender}:</b> `:'';return`<div class="msg msg-${m.type}">${p}${m.text}</div>`;}).join('');c.scrollTop=c.scrollHeight;}
  updateInventory(){document.querySelectorAll('.inv-slot').forEach((slot,i)=>{const item=this.player.inventory[i];
    if(item){slot.innerHTML=`<span style="font-size:20px">${item.icon}</span>`;if(item.count>1)slot.innerHTML+=`<span class="item-count">${item.count>=1000?Math.floor(item.count/1000)+'k':item.count}</span>`;slot.title=item.name;}
    else{slot.innerHTML='';slot.title='';}});}
  updateSkills(){const list=document.getElementById('skills-list');
    const skills=[{name:'Attack',key:'attack',icon:'⚔️'},{name:'Strength',key:'strength',icon:'💪'},{name:'Defence',key:'defence',icon:'🛡️'},{name:'Hitpoints',key:'hitpoints',icon:'❤️'},
      {name:'Mining',key:'mining',icon:'⛏️'},{name:'Woodcutting',key:'woodcutting',icon:'🪓'},{name:'Fishing',key:'fishing',icon:'🐟'},{name:'Cooking',key:'cooking',icon:'🍳'}];
    list.innerHTML=skills.map(s=>{const lv=this.player.stats[s.key]||1;const xp=this.player.xp[s.key]||0;
      return`<div class="skill-entry" title="${s.name}: ${xp} XP"><span class="skill-icon">${s.icon}</span><span style="flex:1;font-size:9px">${s.name}</span><span class="skill-level">${lv}</span></div>`;}).join('');}

  updateMinimap(player,npcs,enemies){const cv=document.getElementById('minimap'),ctx=cv.getContext('2d'),w=cv.width,hh=cv.height;
    ctx.fillStyle='#0a1a0a';ctx.fillRect(0,0,w,hh);const scale=1.2;const cx=player.group.position.x,cz=player.group.position.z;
    ctx.fillStyle='#2a4a1a';ctx.fillRect(0,0,w,hh);
    ctx.fillStyle='#224488';const rx=(22-cx)*scale+w/2;ctx.fillRect(rx-5,0,10,hh);
    buildings.forEach(b=>{ctx.fillStyle=b.userData.name==='Maid Café ♡'?'#FF69B4':'#554433';
      const bx=(b.position.x-cx)*scale+w/2,bz=(b.position.z-cz)*scale+hh/2;
      if(bx>0&&bx<w&&bz>0&&bz<hh)ctx.fillRect(bx-4,bz-4,8,8);});
    ctx.fillStyle='#FFFF00';npcs.forEach(n=>{if(n.userData.isDead)return;const nx=(n.position.x-cx)*scale+w/2,nz=(n.position.z-cz)*scale+hh/2;
      if(nx>0&&nx<w&&nz>0&&nz<hh)ctx.fillRect(nx-1,nz-1,3,3);});
    ctx.fillStyle='#FF0000';enemies.forEach(e=>{if(e.userData.isDead)return;const ex=(e.position.x-cx)*scale+w/2,ez=(e.position.z-cz)*scale+hh/2;
      if(ex>0&&ex<w&&ez>0&&ez<hh)ctx.fillRect(ex-1,ez-1,3,3);});
    ctx.fillStyle='#FFFFFF';ctx.beginPath();ctx.arc(w/2,hh/2,3,0,Math.PI*2);ctx.fill();
    ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(w/2,hh/2,w/2,0,Math.PI*2);ctx.fill();ctx.globalCompositeOperation='source-over';}
}

const labelContainer = document.createElement('div');
labelContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;';
document.body.appendChild(labelContainer);
const labels = new Map();

// FIX #9: Troika 3D text labels in world space
const troikaLabels = new Map();

function getOrCreateTroikaLabel(npc) {
  if (troikaLabels.has(npc)) return troikaLabels.get(npc);

  const textMesh = new Text();
  textMesh.text = npc.userData.overhead || npc.userData.name;
  textMesh.fontSize = 0.4;
  textMesh.color = npc.userData.type === 'enemy' ? 0xFFFF00 : 0x00FFFF;
  textMesh.anchorX = 'center';
  textMesh.anchorY = 'bottom';
  textMesh.outlineWidth = 0.04;    // FIX #9: outline for readability
  textMesh.outlineColor = 0x000000;
  textMesh.font = undefined; // Use default
  textMesh.sync();

  scene.add(textMesh);
  troikaLabels.set(npc, textMesh);
  return textMesh;
}

function updateLabels() {
  [...npcs,...enemies].forEach(npc => {
    if (npc.userData.isDead || !npc.visible) {
      // Hide HTML label
      if (labels.has(npc)) labels.get(npc).style.display = 'none';
      // Hide Troika label
      if (troikaLabels.has(npc)) troikaLabels.get(npc).visible = false;
      return;
    }

    // Update Troika 3D label position (always faces camera via billboard)
    const troikaLabel = getOrCreateTroikaLabel(npc);
    const labelY = (npc.userData.type === 'enemy' && npc.userData.enemyType === 'chicken') ? 2 : 4.2;
    troikaLabel.position.set(npc.position.x, npc.position.y + labelY + 0.5, npc.position.z);
    troikaLabel.quaternion.copy(camera.quaternion); // Billboard effect
    troikaLabel.visible = true;
    troikaLabel.text = npc.userData.overhead || npc.userData.name;

    // HTML overlay for health bars (keep for HP bar rendering)
    if (!labels.has(npc)) {
      const l = document.createElement('div');
      l.style.cssText = 'position:absolute;color:#ff0;font-size:11px;font-weight:bold;text-shadow:1px 1px 0px #000;white-space:nowrap;text-align:center;transform:translate(-50%,-100%);pointer-events:none;';
      labelContainer.appendChild(l); labels.set(npc, l);
    }
    const l = labels.get(npc);
    const pos = new THREE.Vector3().copy(npc.position);
    pos.y += (npc.userData.type === 'enemy' && npc.userData.enemyType === 'chicken') ? 2 : 4.2;
    pos.project(camera);
    if (pos.z > 1 || pos.z < -1) { l.style.display = 'none'; return; }

    // Only show HTML label for health bar overlay
    if (npc.userData.type === 'enemy' && npc.userData.hp < npc.userData.maxHp) {
      l.style.display = 'block';
      l.style.left = `${(pos.x*0.5+0.5)*window.innerWidth}px`;
      l.style.top = `${(-pos.y*0.5+0.5)*window.innerHeight + 16}px`;
      const pct = Math.max(0, npc.userData.hp / npc.userData.maxHp * 100);
      const col = pct > 50 ? '#0f0' : pct > 25 ? '#ff0' : '#f00';
      l.innerHTML = `<div style="width:40px;height:4px;background:#300;margin:2px auto;"><div style="width:${pct}%;height:100%;background:${col};"></div></div>`;
    } else {
      l.style.display = 'none';
    }
  });
}

function showHitsplat(target, damage) {
  const div = document.createElement('div');
  div.style.cssText = `position:absolute;pointer-events:none;font-weight:bold;font-size:14px;z-index:6;
    background:${damage > 0 ? '#c00' : '#004'};color:#fff;border-radius:50%;width:20px;height:20px;
    display:flex;align-items:center;justify-content:center;text-shadow:1px 1px 0px #000;`;
  div.textContent = damage;
  labelContainer.appendChild(div);
  hitsplats.push({ div, target, startTime: performance.now(), duration: 1500 });
}

function updateHitsplats() {
  const now = performance.now();
  for (let i = hitsplats.length - 1; i >= 0; i--) {
    const hs = hitsplats[i];
    const elapsed = now - hs.startTime;
    if (elapsed > hs.duration) { hs.div.remove(); hitsplats.splice(i, 1); continue; }
    const pos = new THREE.Vector3().copy(hs.target.position);
    pos.y += 3 - (elapsed / hs.duration) * 0.5;
    pos.project(camera);
    hs.div.style.left = `${(pos.x*0.5+0.5)*window.innerWidth - 10}px`;
    hs.div.style.top = `${(-pos.y*0.5+0.5)*window.innerHeight}px`;
    hs.div.style.opacity = 1 - (elapsed / hs.duration) * 0.5;
  }
}

function updateNPCsBehavior(time, delta, chatFn) {
  [...npcs,...enemies].forEach(npc => {
    const w = npc.userData.wander;
    if (!w || npc.userData.isDead) return;
    if (!npc.userData._wanderTarget) { npc.userData._wanderTarget = new THREE.Vector3(); npc.userData._wanderTimer = 0; }
    npc.userData._wanderTimer -= delta;
    if (npc.userData._wanderTimer <= 0) {
      const a = Math.random() * Math.PI * 2, d = Math.random() * w.radius;
      npc.userData._wanderTarget.set(w.center.x + Math.cos(a)*d, 0, w.center.z + Math.sin(a)*d);
      npc.userData._wanderTimer = 3 + Math.random() * 5;
    }
    const t = npc.userData._wanderTarget;
    const dx = t.x - npc.position.x, dz = t.z - npc.position.z, dist = Math.sqrt(dx*dx+dz*dz);
    if (dist > 0.5) {
      const speed = w.speed * delta;
      npc.position.x += (dx/dist)*speed; npc.position.z += (dz/dist)*speed;
      npc.position.y = terrainHeight(npc.position.x, npc.position.z);
      npc.rotation.y = Math.atan2(dx, dz);
    }
  });
  npcs.forEach(npc => {
    if (npc.userData.chatMessages && chatFn) {
      if (!npc.userData._lastChat) npc.userData._lastChat = 0;
      const interval = npc.userData.chatInterval || 10000;
      if (time * 1000 - npc.userData._lastChat > interval) {
        const msgs = npc.userData.chatMessages;
        chatFn(npc.userData.name, msgs[Math.floor(Math.random()*msgs.length)], 'public');
        npc.userData._lastChat = time * 1000;
      }
    }
  });
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const keys = {};

function findInteractableParent(obj) {
  let cur = obj;
  while (cur) { if (cur.userData && cur.userData.interactable) return cur; cur = cur.parent; }
  return null;
}

canvas.addEventListener('click', e => {
  if (!player || !ui) return;
  ui.hideContextMenu();
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const allMeshes = [];
  scene.traverse(obj => { if (obj.isMesh && obj.visible) allMeshes.push(obj); });
  const intersects = raycaster.intersectObjects(allMeshes, false);
  if (!intersects.length) return;
  const hit = intersects[0];
  const hitObj = findInteractableParent(hit.object);

  if (hitObj && hitObj.userData.type === 'enemy' && !hitObj.userData.isDead) {
    player.setCombatTarget(hitObj);
    ui.addMessage('', `You attack the ${hitObj.userData.name}.`, 'game');
  } else if (hitObj && hitObj.userData.type === 'npc') {
    player.setMoveTarget(hitObj.position.clone());
    setTimeout(() => { if (hitObj.userData.dialog) ui.showNPCDialog(hitObj.userData.name, hitObj.userData.dialog); }, 500);
  } else if (hitObj && hitObj.userData.type === 'tree') {
    if (player.hasItem('Bronze Axe')) { player.setSkillingTarget(hitObj, 'woodcutting'); ui.addMessage('', `You swing your axe at the ${hitObj.userData.name}.`, 'game'); }
    else ui.addMessage('', 'You need an axe to chop trees.', 'game');
  } else if (hitObj && hitObj.userData.type === 'rock') {
    if (player.hasItem('Bronze Pickaxe')) { player.setSkillingTarget(hitObj, 'mining'); ui.addMessage('', 'You swing your pickaxe at the rock.', 'game'); }
    else ui.addMessage('', 'You need a pickaxe to mine rocks.', 'game');
  } else if (hitObj && hitObj.userData.type === 'fishing_spot') {
    if (player.hasItem('Net')) { player.setSkillingTarget(hitObj, 'fishing'); ui.addMessage('', 'You cast your net into the water.', 'game'); }
    else ui.addMessage('', 'You need a net to fish here.', 'game');
  } else {
    player.setMoveTarget(hit.point);
  }
});

const clock = new THREE.Clock();

function gameLoop() {
  requestAnimationFrame(gameLoop);
  const delta = Math.min(clock.getDelta(), 0.1);
  const time = clock.getElapsedTime();
  if (!player) return;

  // Camera WASD
  if (document.activeElement.id !== 'chat-input') {
    if (keys['a']) camState.angle -= 1.5 * delta;
    if (keys['d']) camState.angle += 1.5 * delta;
    if (keys['w']) camState.pitch = Math.min(camState.maxPitch, camState.pitch + 30 * delta);
    if (keys['s']) camState.pitch = Math.max(camState.minPitch, camState.pitch - 30 * delta);
  }

  camState.targetPos.lerp(
    new THREE.Vector3(player.group.position.x, player.group.position.y + 3, player.group.position.z),
    5 * delta
  );
  updateCamera();

  sunLight.target.position.copy(camState.targetPos);
  sunLight.position.copy(sunPos).multiplyScalar(60).add(camState.targetPos);

  // Player
  player.update(delta, time, {
    onHit: (enemy, damage) => {
      showHitsplat(enemy, damage);
      if (damage > 0) {
        ui.addMessage('', `You hit the ${enemy.userData.name} for ${damage} damage.`, 'game');
        const atkXP = damage * 4, strXP = damage * 4, hpXP = Math.floor(damage * 1.33);
        player.addXP('attack', atkXP); player.addXP('strength', strXP);
        const hpResult = player.addXP('hitpoints', hpXP);
        ui.showXPDrop('attack', atkXP);
        setTimeout(() => ui.showXPDrop('strength', strXP), 300);
        setTimeout(() => ui.showXPDrop('hitpoints', hpXP), 600);
        if (hpResult.levelUp) ui.addMessage('', `🎉 Your Hitpoints level is now ${hpResult.level}!`, 'game');
      } else {
        ui.addMessage('', `You miss the ${enemy.userData.name}.`, 'game');
      }
    },
    onKill: (enemy) => {
      ui.addMessage('', `You have defeated the ${enemy.userData.name}!`, 'game');
      if (enemy.userData.drops) {
        enemy.userData.drops.forEach(drop => {
          if (Math.random() <= drop.chance) {
            const count = drop.name === 'Coins' ? Math.floor(Math.random() * 15) + 1 : 1;
            player.addItem({ name: drop.name, icon: drop.icon, count, type: 'loot' });
            ui.addMessage('', `${drop.icon} You received: ${drop.name}${count > 1 ? ` x${count}` : ''}.`, 'game');
          }
        });
        ui.updateInventory();
      }
    },
    onSkill: (type, target) => {
      if (type === 'woodcutting') {
        const xpAmt = target.userData.treeType === 'oak' ? 37.5 : 25;
        const r = player.addXP('woodcutting', xpAmt); ui.showXPDrop('woodcutting', xpAmt);
        const logName = target.userData.treeType === 'oak' ? 'Oak Logs' : 'Logs';
        player.addItem({ name: logName, icon: '🪵', count: 1, type: 'resource' });
        ui.addMessage('', `You get some ${logName.toLowerCase()}.`, 'game');
        if (r.levelUp) ui.addMessage('', `🎉 Your Woodcutting level is now ${r.level}!`, 'game');
      } else if (type === 'mining') {
        const r = player.addXP('mining', 17.5); ui.showXPDrop('mining', 17.5);
        const ores = [{ name: 'Copper Ore', icon: '🟤' }, { name: 'Tin Ore', icon: '⬜' }];
        const ore = ores[Math.floor(Math.random() * ores.length)];
        player.addItem({ ...ore, count: 1, type: 'resource' });
        ui.addMessage('', `You manage to mine some ${ore.name.toLowerCase()}.`, 'game');
        if (r.levelUp) ui.addMessage('', `🎉 Your Mining level is now ${r.level}!`, 'game');
      } else if (type === 'fishing') {
        const r = player.addXP('fishing', 10); ui.showXPDrop('fishing', 10);
        player.addItem({ name: 'Raw Shrimp', icon: '🦐', count: 1, type: 'resource' });
        ui.addMessage('', 'You catch some shrimp.', 'game');
        if (r.levelUp) ui.addMessage('', `🎉 Your Fishing level is now ${r.level}!`, 'game');
      }
      ui.updateInventory(); ui.updateSkills();
    },
  });

  // NPCs
  updateNPCsBehavior(time, delta, (sender, msg, type) => ui.addMessage(sender, msg, type));

  // Water animation
  if (water) water.material.uniforms['time'].value += delta;

  // Fishing bubbles
  fishSpots.forEach(spot => {
    spot.children.forEach((bubble, i) => { bubble.position.y = Math.sin(time * 3 + i) * 0.3 + 0.2; });
  });

  // Marker pulse
  if (player.marker.visible) {
    player.marker.rotation.y = time * 3;
    player.marker.scale.setScalar(0.8 + Math.sin(time * 5) * 0.2);
  }

  ui.updateOrbs();
  updateLabels();
  updateHitsplats();

  if (time - (window._lastMinimap || 0) > 0.2) {
    ui.updateMinimap(player, npcs, enemies);
    window._lastMinimap = time;
  }

  composer.render();
}

// ============================================================
//  RESIZE
// ============================================================
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloomPass.setSize(w, h);
  ssaoPass.setSize(w, h);
});

// ============================================================
//  START
// ============================================================
buildWorld().then(() => gameLoop());
</script>
</body>
</html>
