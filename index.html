<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDOS - Lumbridge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;color:#fff}
canvas{display:block}
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s}
#loading h1{font-size:2.5em;color:#ff9;text-shadow:0 0 20px #fa0;margin-bottom:20px}
#loading .bar{width:300px;height:6px;background:#333;border-radius:3px;overflow:hidden}
#loading .fill{height:100%;width:0;background:linear-gradient(90deg,#fa0,#ff9);border-radius:3px;transition:width 0.3s}
#loading p{margin-top:12px;color:#aaa;font-size:0.9em}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#minimap{position:absolute;top:8px;right:8px;width:160px;height:160px;border:3px solid #5a4a2a;border-radius:50%;overflow:hidden;background:#1a2a0a;pointer-events:auto}
#minimap canvas{width:100%;height:100%;border-radius:50%}
#minimap .compass{position:absolute;top:4px;left:50%;transform:translateX(-50%);color:#ff9;font-size:10px;font-weight:bold;text-shadow:0 0 3px #000}
#inventory{position:absolute;top:180px;right:8px;width:160px;background:linear-gradient(180deg,#3a2a1a,#2a1a0a);border:2px solid #5a4a2a;border-radius:4px;pointer-events:auto}
#inv-header{text-align:center;padding:6px;background:#4a3a1a;border-bottom:1px solid #5a4a2a;font-size:12px;color:#ff9;cursor:pointer}
#inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:4px}
.inv-slot{aspect-ratio:1;background:rgba(0,0,0,0.4);border:1px solid #3a3020;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:18px}
#chatbox{position:absolute;bottom:8px;left:8px;width:500px;max-width:calc(100vw - 200px);background:rgba(0,0,0,0.75);border:2px solid #5a4a2a;border-radius:4px;pointer-events:auto}
#chat-tabs{display:flex;background:#2a1a0a;border-bottom:1px solid #5a4a2a}
.chat-tab{padding:4px 12px;font-size:11px;color:#aa9;cursor:pointer;border-right:1px solid #3a2a1a}
.chat-tab.active{color:#ff9;background:#3a2a1a}
#chat-log{height:120px;overflow-y:auto;padding:6px;font-size:12px;line-height:1.5}
#chat-log::-webkit-scrollbar{width:6px}
#chat-log::-webkit-scrollbar-thumb{background:#5a4a2a;border-radius:3px}
.chat-msg{margin-bottom:1px}
.chat-msg .name{font-weight:bold}
.chat-game{color:#0af}
.chat-npc{color:#ff9}
.chat-player{color:#fff}
.chat-public{color:#99f}
#chat-input-wrap{display:flex;border-top:1px solid #5a4a2a}
#chat-input{flex:1;background:transparent;border:none;color:#fff;padding:6px;font-size:12px;outline:none}
#chat-input::placeholder{color:#665}
#stats{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.6);padding:6px 10px;border-radius:4px;font-size:11px;color:#aaa;pointer-events:auto}
#dialog-box{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);width:400px;background:rgba(10,8,4,0.92);border:2px solid #aa8;border-radius:6px;padding:16px;display:none;pointer-events:auto;text-align:center}
#dialog-box h3{color:#ff9;margin-bottom:8px;font-size:14px}
#dialog-box p{color:#dda;font-size:13px;margin-bottom:12px;line-height:1.5}
#dialog-box .options{display:flex;flex-direction:column;gap:4px}
#dialog-box .opt{background:#3a2a1a;border:1px solid #5a4a2a;color:#ff9;padding:6px;cursor:pointer;border-radius:3px;font-size:12px}
#dialog-box .opt:hover{background:#4a3a2a}
#ground-marker{position:absolute;pointer-events:none;display:none}
#location-label{position:absolute;top:50px;left:50%;transform:translateX(-50%);color:#ff9;font-size:11px;text-shadow:0 0 4px #000;opacity:0;transition:opacity 0.5s}
</style>
<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<div id="loading"><h1>🔥 HDOS</h1><div class="bar"><div class="fill" id="load-fill"></div></div><p id="load-text">Initializing...</p></div>
<div id="ui">
  <div id="stats">HDOS Lumbridge | <span id="fps">0</span> FPS | <span id="coords">0, 0</span></div>
  <div id="minimap"><canvas id="minimap-canvas" width="160" height="160"></canvas><div class="compass">N</div></div>
  <div id="inventory">
    <div id="inv-header">Inventory</div>
    <div id="inv-grid"></div>
  </div>
  <div id="chatbox">
    <div id="chat-tabs">
      <div class="chat-tab active" data-tab="all">All</div>
      <div class="chat-tab" data-tab="game">Game</div>
      <div class="chat-tab" data-tab="public">Public</div>
    </div>
    <div id="chat-log"></div>
    <div id="chat-input-wrap"><input id="chat-input" placeholder="Press Enter to chat..." /></div>
  </div>
  <div id="dialog-box"><h3 id="dlg-name"></h3><p id="dlg-text"></p><div class="options" id="dlg-opts"></div></div>
  <div id="location-label"></div>
</div>

<script type="module">
import*as THREE from 'three';
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';
import{SMAAPass}from'three/addons/postprocessing/SMAAPass.js';
import{Sky}from'three/addons/objects/Sky.js';

const loadFill=document.getElementById('load-fill');
const loadText=document.getElementById('load-text');
function setLoad(p,t){loadFill.style.width=p+'%';loadText.textContent=t}

// ─── RENDERER ───
setLoad(5,'Setting up renderer...');
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.9;
renderer.outputColorSpace=THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0xc4a882,0.008);

const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.5,500);
camera.position.set(0,35,40);
camera.lookAt(0,0,0);

// ─── TEXTURE GENERATOR ───
setLoad(10,'Generating textures...');
function makeCanvas(w,h,fn){const c=document.createElement('canvas');c.width=w;c.height=h;fn(c.getContext('2d'),w,h);return c}

function grassTex(){
  return makeCanvas(512,512,(ctx,w,h)=>{
    ctx.fillStyle='#3a6b2a';ctx.fillRect(0,0,w,h);
    for(let i=0;i<8000;i++){
      const x=Math.random()*w,y=Math.random()*h;
      const g=Math.floor(Math.random()*40)+80;
      ctx.fillStyle=`rgb(${30+Math.random()*30},${g+Math.random()*50},${20+Math.random()*20})`;
      ctx.fillRect(x,y,1+Math.random()*2,1+Math.random()*3);
    }
    for(let i=0;i<200;i++){
      const x=Math.random()*w,y=Math.random()*h;
      ctx.fillStyle=['#ff6','#f6f','#faa','#aaf','#ffa'][Math.floor(Math.random()*5)];
      ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();
    }
  });
}

function stoneTex(){
  return makeCanvas(256,256,(ctx,w,h)=>{
    ctx.fillStyle='#888';ctx.fillRect(0,0,w,h);
    for(let y=0;y<h;y+=32){
      for(let x=0;x<w;x+=64){
        const ox=y%64?32:0;
        const g=120+Math.random()*40;
        ctx.fillStyle=`rgb(${g},${g-5},${g-10})`;
        ctx.fillRect(x+ox+1,y+1,62,30);
      }
    }
    for(let i=0;i<2000;i++){
      ctx.fillStyle=`rgba(${Math.random()>0.5?0:255},${Math.random()>0.5?0:255},${Math.random()>0.5?0:255},0.03)`;
      ctx.fillRect(Math.random()*w,Math.random()*h,2,2);
    }
  });
}

function woodTex(){
  return makeCanvas(256,256,(ctx,w,h)=>{
    ctx.fillStyle='#6b4226';ctx.fillRect(0,0,w,h);
    for(let i=0;i<100;i++){
      const y=Math.random()*h;
      ctx.strokeStyle=`rgba(${40+Math.random()*30},${25+Math.random()*20},${10+Math.random()*10},0.4)`;
      ctx.lineWidth=1+Math.random()*2;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y+Math.random()*8-4);ctx.stroke();
    }
  });
}

function dirtTex(){
  return makeCanvas(256,256,(ctx,w,h)=>{
    ctx.fillStyle='#7a5c3a';ctx.fillRect(0,0,w,h);
    for(let i=0;i<3000;i++){
      const g=80+Math.random()*60;
      ctx.fillStyle=`rgb(${g+20},${g},${g-20})`;
      ctx.fillRect(Math.random()*w,Math.random()*h,1+Math.random()*3,1+Math.random()*3);
    }
  });
}

function barkTex(){
  return makeCanvas(128,256,(ctx,w,h)=>{
    ctx.fillStyle='#4a3020';ctx.fillRect(0,0,w,h);
    for(let y=0;y<h;y+=3){
      ctx.strokeStyle=`rgba(${30+Math.random()*30},${20+Math.random()*15},${10+Math.random()*10},0.6)`;
      ctx.lineWidth=2+Math.random()*3;
      ctx.beginPath();ctx.moveTo(0,y);
      for(let x=0;x<w;x+=10)ctx.lineTo(x,y+Math.random()*4-2);
      ctx.stroke();
    }
  });
}

function roofTex(){
  return makeCanvas(256,256,(ctx,w,h)=>{
    ctx.fillStyle='#8b4513';ctx.fillRect(0,0,w,h);
    for(let y=0;y<h;y+=12){
      const ox=y%24?16:0;
      for(let x=-16;x<w+16;x+=32){
        ctx.fillStyle=`rgb(${120+Math.random()*40},${50+Math.random()*30},${10+Math.random()*15})`;
        ctx.beginPath();ctx.ellipse(x+ox,y+6,16,7,0,0,Math.PI*2);ctx.fill();
      }
    }
  });
}

function waterNormalCanvas(){
  return makeCanvas(256,256,(ctx,w,h)=>{
    ctx.fillStyle='rgb(128,128,255)';ctx.fillRect(0,0,w,h);
    for(let i=0;i<500;i++){
      const x=Math.random()*w,y=Math.random()*h,r=5+Math.random()*15;
      const grad=ctx.createRadialGradient(x,y,0,x,y,r);
      grad.addColorStop(0,`rgb(${128+Math.random()*30-15},${128+Math.random()*30-15},255)`);
      grad.addColorStop(1,'rgba(128,128,255,0)');
      ctx.fillStyle=grad;ctx.fillRect(x-r,y-r,r*2,r*2);
    }
  });
}

function pinkTex(){
  return makeCanvas(256,256,(ctx,w,h)=>{
    ctx.fillStyle='#ffccdd';ctx.fillRect(0,0,w,h);
    for(let i=0;i<1500;i++){
      ctx.fillStyle=`rgba(255,${180+Math.random()*40},${200+Math.random()*40},0.3)`;
      ctx.fillRect(Math.random()*w,Math.random()*h,2,2);
    }
  });
}

const texGrass=new THREE.CanvasTexture(grassTex());texGrass.wrapS=texGrass.wrapT=THREE.RepeatWrapping;texGrass.repeat.set(20,20);
const texStone=new THREE.CanvasTexture(stoneTex());texStone.wrapS=texStone.wrapT=THREE.RepeatWrapping;texStone.repeat.set(2,2);
const texWood=new THREE.CanvasTexture(woodTex());texWood.wrapS=texWood.wrapT=THREE.RepeatWrapping;
const texDirt=new THREE.CanvasTexture(dirtTex());texDirt.wrapS=texDirt.wrapT=THREE.RepeatWrapping;texDirt.repeat.set(4,4);
const texBark=new THREE.CanvasTexture(barkTex());texBark.wrapS=texBark.wrapT=THREE.RepeatWrapping;
const texRoof=new THREE.CanvasTexture(roofTex());texRoof.wrapS=texRoof.wrapT=THREE.RepeatWrapping;texRoof.repeat.set(2,2);
const texPink=new THREE.CanvasTexture(pinkTex());texPink.wrapS=texPink.wrapT=THREE.RepeatWrapping;

const matStone=new THREE.MeshStandardMaterial({map:texStone,roughness:0.85,metalness:0.05});
const matWood=new THREE.MeshStandardMaterial({map:texWood,roughness:0.7,metalness:0.0,color:0x8b6914});
const matDarkWood=new THREE.MeshStandardMaterial({map:texWood,roughness:0.75,metalness:0.0,color:0x5a3a1a});
const matGrass=new THREE.MeshStandardMaterial({map:texGrass,roughness:0.95,metalness:0.0});
const matDirt=new THREE.MeshStandardMaterial({map:texDirt,roughness:0.9,metalness:0.0});
const matBark=new THREE.MeshStandardMaterial({map:texBark,roughness:0.8,metalness:0.0});
const matRoof=new THREE.MeshStandardMaterial({map:texRoof,roughness:0.75,metalness:0.0});
const matPink=new THREE.MeshStandardMaterial({map:texPink,roughness:0.5,metalness:0.1,color:0xffaacc});
const matWhite=new THREE.MeshStandardMaterial({color:0xffeeff,roughness:0.4,metalness:0.1});

// ─── SKY ───
setLoad(15,'Creating sky...');
const sky=new Sky();
sky.scale.setScalar(10000);
scene.add(sky);
const skyUniforms=sky.material.uniforms;
skyUniforms['turbidity'].value=4;
skyUniforms['rayleigh'].value=1.5;
skyUniforms['mieCoefficient'].value=0.005;
skyUniforms['mieDirectionalG'].value=0.8;
const sunPos=new THREE.Vector3();
const phi=THREE.MathUtils.degToRad(90-35);
const theta=THREE.MathUtils.degToRad(200);
sunPos.setFromSphericalCoords(1,phi,theta);
skyUniforms['sunPosition'].value.copy(sunPos);

// ─── LIGHTING ───
setLoad(20,'Setting up lighting...');
const hemi=new THREE.HemisphereLight(0x87CEEB,0x3a5a2a,0.6);
scene.add(hemi);

const sun=new THREE.DirectionalLight(0xffd4a0,2.5);
sun.position.set(30,50,-20);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-80;sun.shadow.camera.right=80;
sun.shadow.camera.top=80;sun.shadow.camera.bottom=-80;
sun.shadow.camera.near=1;sun.shadow.camera.far=200;
sun.shadow.bias=-0.001;
sun.shadow.normalBias=0.02;
scene.add(sun);

const ambFill=new THREE.DirectionalLight(0x8090c0,0.3);
ambFill.position.set(-20,20,30);
scene.add(ambFill);

// ─── GROUND ───
setLoad(25,'Building terrain...');
const groundGeo=new THREE.PlaneGeometry(200,200,100,100);
groundGeo.rotateX(-Math.PI/2);
const verts=groundGeo.attributes.position;
for(let i=0;i<verts.count;i++){
  const x=verts.getX(i),z=verts.getZ(i);
  let y=Math.sin(x*0.05)*0.5+Math.cos(z*0.07)*0.4+Math.sin(x*0.02+z*0.03)*1.2;
  if(Math.abs(x)<4&&z>-30&&z<30)y=Math.min(y,-0.3);
  verts.setY(i,y);
}
groundGeo.computeVertexNormals();
const ground=new THREE.Mesh(groundGeo,matGrass);
ground.receiveShadow=true;
scene.add(ground);

// Dirt paths
function makePath(points,width){
  const shape=new THREE.Shape();
  const hw=width/2;
  for(let i=0;i<points.length-1;i++){
    const a=points[i],b=points[i+1];
    const dx=b[0]-a[0],dz=b[1]-a[1];
    const len=Math.sqrt(dx*dx+dz*dz);
    const nx=-dz/len*hw,nz=dx/len*hw;
    if(i===0){shape.moveTo(a[0]+nx,a[1]+nz);shape.lineTo(a[0]-nx,a[1]-nz)}
    shape.lineTo(b[0]-nx,b[1]-nz);
  }
  for(let i=points.length-1;i>=1;i--){
    const a=points[i-1],b=points[i];
    const dx=b[0]-a[0],dz=b[1]-a[1];
    const len=Math.sqrt(dx*dx+dz*dz);
    const nx=-dz/len*hw;const nz=dx/len*hw;
    shape.lineTo(a[0]+nx,a[1]+nz);
  }
  const geo=new THREE.ShapeGeometry(shape);
  geo.rotateX(-Math.PI/2);
  const mesh=new THREE.Mesh(geo,matDirt);
  mesh.position.y=0.05;
  mesh.receiveShadow=true;
  scene.add(mesh);
}
makePath([[0,40],[0,10],[0,-5],[-5,-15],[-15,-25]],3);
makePath([[0,5],[15,5],[30,5]],2.5);
makePath([[0,5],[-12,8],[-25,12]],2.5);

// Stone courtyard area
const courtGeo=new THREE.CircleGeometry(8,32);
courtGeo.rotateX(-Math.PI/2);
const courtMat=new THREE.MeshStandardMaterial({map:texStone.clone(),roughness:0.9,metalness:0.05});
courtMat.map.repeat.set(4,4);
const court=new THREE.Mesh(courtGeo,courtMat);
court.position.set(0,0.06,5);court.receiveShadow=true;
scene.add(court);

// ─── CASTLE ───
setLoad(35,'Building Lumbridge Castle...');
function box(w,h,d,mat){const g=new THREE.BoxGeometry(w,h,d);const m=new THREE.Mesh(g,mat);m.castShadow=true;m.receiveShadow=true;return m}
function cyl(r,h,seg,mat){const g=new THREE.CylinderGeometry(r,r,h,seg);const m=new THREE.Mesh(g,mat);m.castShadow=true;m.receiveShadow=true;return m}

const castle=new THREE.Group();

// Main hall
const hall=box(16,8,12,matStone);hall.position.set(0,4,0);castle.add(hall);

// Front wall detail - arched entrance
const doorFrame=box(3,5,1,matDarkWood);doorFrame.position.set(0,2.5,6.2);castle.add(doorFrame);
const doorArch=cyl(1.5,1,16,matStone);doorArch.rotation.x=Math.PI/2;doorArch.position.set(0,5.2,6.2);castle.add(doorArch);

// Windows - arched
function addWindow(x,y,z,ry=0){
  const frame=box(1.2,2,0.5,matDarkWood);frame.position.set(x,y,z);frame.rotation.y=ry;
  const glass=box(0.8,1.5,0.1,new THREE.MeshStandardMaterial({color:0x88aacc,transparent:true,opacity:0.5,roughness:0.2,metalness:0.3}));
  glass.position.set(x,y,z);glass.rotation.y=ry;
  const arch=cyl(0.6,0.5,8,matStone);arch.rotation.x=Math.PI/2;arch.rotation.y=ry;arch.position.set(x,y+1.2,z);
  castle.add(frame,glass,arch);
}
addWindow(-5,4.5,6.2);addWindow(5,4.5,6.2);
addWindow(-5,4.5,-6.2);addWindow(5,4.5,-6.2);
addWindow(8.2,4.5,0,Math.PI/2);addWindow(-8.2,4.5,0,Math.PI/2);

// Roof
const roofGeo=new THREE.ConeGeometry(12,5,4);
const roof=new THREE.Mesh(roofGeo,matRoof);
roof.position.set(0,10.5,0);roof.rotation.y=Math.PI/4;roof.castShadow=true;
castle.add(roof);

// Towers
function addTower(x,z){
  const tw=cyl(3,14,12,matStone);tw.position.set(x,7,z);castle.add(tw);
  const tRoof=new THREE.Mesh(new THREE.ConeGeometry(3.8,4,12),matRoof);
  tRoof.position.set(x,15.5,z);tRoof.castShadow=true;castle.add(tRoof);
  // Crenellations
  for(let a=0;a<Math.PI*2;a+=Math.PI/4){
    const c=box(1.2,1.5,0.8,matStone);
    c.position.set(x+Math.cos(a)*3.2,14.2,z+Math.sin(a)*3.2);
    castle.add(c);
  }
  // Tower windows
  for(let a=0;a<Math.PI*2;a+=Math.PI/2){
    const wg=box(0.8,1.5,0.3,new THREE.MeshStandardMaterial({color:0xffdd88,emissive:0x443300,emissiveIntensity:0.5,roughness:0.3}));
    wg.position.set(x+Math.cos(a)*3.1,8,z+Math.sin(a)*3.1);
    wg.lookAt(x,8,z);
    castle.add(wg);
  }
  // Tower light
  const tl=new THREE.PointLight(0xffaa44,2,15);
  tl.position.set(x,9,z);castle.add(tl);
}
addTower(-8,-6);addTower(8,-6);addTower(-8,6);addTower(8,6);

// Courtyard walls
function wallSeg(x1,z1,x2,z2,h=4){
  const dx=x2-x1,dz=z2-z1,len=Math.sqrt(dx*dx+dz*dz);
  const w=box(len,h,1,matStone);
  w.position.set((x1+x2)/2,h/2,(z1+z2)/2);
  w.rotation.y=Math.atan2(dx,dz);
  castle.add(w);
}
wallSeg(-11,9,11,9);wallSeg(-11,9,-11,6);wallSeg(11,9,11,6);

// Courtyard crenellations
for(let x=-10;x<=10;x+=2.5){
  const c=box(1,1.2,0.6,matStone);c.position.set(x,4.6,9);castle.add(c);
}

// Gate
const gate=box(4,5,1,matDarkWood);gate.position.set(0,2.5,9.2);castle.add(gate);
const gateArch=cyl(2,1,12,matStone);gateArch.rotation.x=Math.PI/2;gateArch.position.set(0,5.2,9.2);castle.add(gateArch);

// Flags on towers
function addFlag(x,y,z,color){
  const pole=cyl(0.1,4,6,new THREE.MeshStandardMaterial({color:0x888888,metalness:0.8,roughness:0.3}));
  pole.position.set(x,y+2,z);castle.add(pole);
  const flagGeo=new THREE.PlaneGeometry(2,1.2);
  const flagMat=new THREE.MeshStandardMaterial({color,side:THREE.DoubleSide,roughness:0.8});
  const flag=new THREE.Mesh(flagGeo,flagMat);
  flag.position.set(x+1,y+3.5,z);flag.castShadow=true;
  flag.userData.isFlag=true;
  castle.add(flag);
}
addFlag(-8,17.5,-6,0xcc0000);addFlag(8,17.5,-6,0xcc0000);
addFlag(-8,17.5,6,0x0044aa);addFlag(8,17.5,6,0x0044aa);

  uniforms:{
    uTime:{value:0},
    uColor:{value:new THREE.Color(0x1a6baa)},
    uOpacity:{value:0.7},
    uSunDir:{value:sunPos.clone().normalize()}
  },
  vertexShader:`
    uniform float uTime;
    varying vec2 vUv;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    void main(){
      vUv=uv;
      vec3 pos=position;
      pos.y+=sin(pos.x*2.0+uTime*1.5)*0.15+cos(pos.z*0.8+uTime)*0.1;
      vWorldPos=(modelMatrix*vec4(pos,1.0)).xyz;
      vNormal=normalize(normalMatrix*vec3(
        -cos(pos.x*2.0+uTime*1.5)*0.3,
        1.0,
        sin(pos.z*0.8+uTime)*0.08
      ));
      gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.0);
    }
  `,
  fragmentShader:`
    uniform vec3 uColor;
    uniform float uOpacity;
    uniform float uTime;
    uniform vec3 uSunDir;
    varying vec2 vUv;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    void main(){
      vec3 viewDir=normalize(cameraPosition-vWorldPos);
      float fresnel=pow(1.0-max(dot(viewDir,vNormal),0.0),3.0);
      vec3 skyColor=vec3(0.5,0.7,1.0);
      vec3 waterCol=mix(uColor,skyColor,fresnel*0.6);
      vec3 halfDir=normalize(uSunDir+viewDir);
      float spec=pow(max(dot(vNormal,halfDir),0.0),64.0);
      waterCol+=vec3(1.0,0.95,0.8)*spec*0.8;
      float caustic=sin(vWorldPos.x*4.0+uTime*2.0)*sin(vWorldPos.z*3.0+uTime*1.5)*0.1;
      waterCol+=vec3(0.2,0.4,0.5)*caustic;
      gl_FragColor=vec4(waterCol,uOpacity+fresnel*0.2);
    }
  `,
  transparent:true,
  side:THREE.DoubleSide
});

function makeTree(x,z,scale=1,type=0){
  const g=new THREE.Group();
  const trunkH=4*scale+Math.random()*2;
  const trunk=cyl(0.4*scale,trunkH,8,matBark);
  trunk.position.y=trunkH/2;g.add(trunk);
  
  if(type===0){
    // Layered sphere foliage
    const colors=[0x2d5a1e,0x3a7a2a,0x4a8a3a,0x2a6a1a];
    for(let i=0;i<4;i++){
      const r=(2+Math.random())*scale;
      const fMat=new THREE.MeshStandardMaterial({color:colors[i%4],roughness:0.95,metalness:0});
      const foliage=new THREE.Mesh(new THREE.SphereGeometry(r,8,6),fMat);
      foliage.position.set(Math.random()*1.5-0.75,trunkH+i*0.8+Math.random(),Math.random()*1.5-0.75);
      foliage.castShadow=true;g.add(foliage);
    }
  } else {
    // Cone foliage (pine)
    for(let i=0;i<3;i++){
      const r=(2.5-i*0.5)*scale;
      const fMat=new THREE.MeshStandardMaterial({color:0x1a4a0a+i*0x050500,roughness:0.95});
      const cone=new THREE.Mesh(new THREE.ConeGeometry(r,3*scale,8),fMat);
      cone.position.y=trunkH+i*2*scale;cone.castShadow=true;g.add(cone);
    }
  }
  
  // Roots
  for(let i=0;i<3;i++){
    const a=Math.PI*2/3*i+Math.random()*0.5;
    const root=cyl(0.15*scale,1.5*scale,6,matBark);
    root.position.set(Math.cos(a)*0.8*scale,0.3,Math.sin(a)*0.8*scale);
    root.rotation.z=Math.cos(a)*0.5;root.rotation.x=Math.sin(a)*0.5;
    g.add(root);
  }
  
  g.position.set(x,0,z);
  g.userData.isTree=true;
  scene.add(g);
  return g;
}

function addBuilding(x,z,w,d,h,name,mat,roofMat,roofType='pointed'){
  const g=new THREE.Group();
  g.userData.name=name;
  
  const walls=box(w,h,d,mat);walls.position.y=h/2;g.add(walls);
  
  // Door
  const door=box(1.5,2.5,0.3,matDarkWood);door.position.set(0,1.25,d/2+0.1);g.add(door);
  
  // Windows
  const winMat=new THREE.MeshStandardMaterial({color:0xffdd88,emissive:0x332200,emissiveIntensity:0.3,transparent:true,opacity:0.7});
  if(w>4){
    addWindowSimple(g,-w/3,h*0.6,d/2+0.1,winMat);
    addWindowSimple(g,w/3,h*0.6,d/2+0.1,winMat);
  }
  
  // Roof
  if(roofType==='pointed'){
    const rGeo=new THREE.ConeGeometry(Math.max(w,d)*0.75,3,4);
    const r=new THREE.Mesh(rGeo,roofMat);r.position.y=h+1.5;r.rotation.y=Math.PI/4;r.castShadow=true;g.add(r);
  } else {
    const rGeo=new THREE.BoxGeometry(w+1,0.5,d+1);
    const r=new THREE.Mesh(rGeo,roofMat);r.position.y=h+0.25;r.castShadow=true;g.add(r);
  }
  
  // Sign
  const signGeo=new THREE.PlaneGeometry(2.5,0.8);
  const signCanvas=makeCanvas(256,80,(ctx,cw,ch)=>{
    ctx.fillStyle='#3a2a1a';ctx.fillRect(0,0,cw,ch);
    ctx.strokeStyle='#5a4a2a';ctx.lineWidth=3;ctx.strokeRect(2,2,cw-4,ch-4);
    ctx.fillStyle='#ff9';ctx.font='bold 28px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(name,cw/2,ch/2);
  });
  const signMat=new THREE.MeshStandardMaterial({map:new THREE.CanvasTexture(signCanvas),roughness:0.7});
  const sign=new THREE.Mesh(signGeo,signMat);
  sign.position.set(0,h+0.5,d/2+0.3);g.add(sign);
  
  g.position.set(x,0,z);
  scene.add(g);
  return g;
}

  w.position.set(x,y,z);parent.add(w);
}

  ]}
],{hair:0x228822,pantsColor:0x336633});

const npcs=[npcHans,npcDuke,npcMaid,npcBuyingGF];

// ─── PARTICLES ───
setLoad(88,'Adding atmosphere...');
// Dust motes
const dustCount=200;
const dustGeo=new THREE.BufferGeometry();
const dustPos=new Float32Array(dustCount*3);
const dustVel=new Float32Array(dustCount*3);
for(let i=0;i<dustCount;i++){
  dustPos[i*3]=Math.random()*100-50;
  dustPos[i*3+1]=1+Math.random()*15;
  dustPos[i*3+2]=Math.random()*100-50;
  dustVel[i*3]=(Math.random()-0.5)*0.3;
  dustVel[i*3+1]=(Math.random()-0.5)*0.1;
  dustVel[i*3+2]=(Math.random()-0.5)*0.3;
}
dustGeo.setAttribute('position',new THREE.BufferAttribute(dustPos,3));
const dustMat=new THREE.PointsMaterial({color:0xffeedd,size:0.08,transparent:true,opacity:0.5,sizeAttenuation:true});
const dust=new THREE.Points(dustGeo,dustMat);
scene.add(dust);

// Fireflies (near café and trees)
const flyCount=40;
const flyGeo=new THREE.BufferGeometry();
const flyPos=new Float32Array(flyCount*3);
const flyData=[];
for(let i=0;i<flyCount;i++){
  const cx=i<15?-10+Math.random()*8:Math.random()*80-40;
  const cz=i<15?10+Math.random()*8:Math.random()*80-40;
  flyPos[i*3]=cx;flyPos[i*3+1]=1+Math.random()*4;flyPos[i*3+2]=cz;
  flyData.push({cx,cz,phase:Math.random()*Math.PI*2,speed:0.3+Math.random()*0.5,radius:1+Math.random()*3});
}
flyGeo.setAttribute('position',new THREE.BufferAttribute(flyPos,3));
const flyMat=new THREE.PointsMaterial({color:0xaaffaa,size:0.15,transparent:true,opacity:0.8,sizeAttenuation:true});
const flies=new THREE.Points(flyGeo,flyMat);
scene.add(flies);

// Falling leaves
const leafCount=30;
const leafGeo=new THREE.BufferGeometry();
const leafPos=new Float32Array(leafCount*3);
const leafVel=[];
for(let i=0;i<leafCount;i++){
  leafPos[i*3]=Math.random()*60-30;
  leafPos[i*3+1]=5+Math.random()*15;
  leafPos[i*3+2]=Math.random()*60-30;
  leafVel.push({vx:(Math.random()-0.5)*0.5,vy:-0.3-Math.random()*0.3,vz:(Math.random()-0.5)*0.5,spin:Math.random()*2});
}
leafGeo.setAttribute('position',new THREE.BufferAttribute(leafPos,3));
const leafMat=new THREE.PointsMaterial({color:0x88aa44,size:0.12,transparent:true,opacity:0.7,sizeAttenuation:true});
const leaves=new THREE.Points(leafGeo,leafMat);
scene.add(leaves);

// ─── POST PROCESSING ───
setLoad(92,'Post-processing pipeline...');
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),0.25,0.5,0.85);
composer.addPass(bloom);
const smaa=new SMAAPass(window.innerWidth,window.innerHeight);
composer.addPass(smaa);

// ─── UI ───
setLoad(95,'Setting up UI...');
// Inventory
const invGrid=document.getElementById('inv-grid');
const invItems=['⚔️','🛡️','🎣','🪓','⛏️','🍖','🪙','🧪','','','','','','','','','','','','','','','','','','','',''];
invItems.forEach(item=>{
  const slot=document.createElement('div');slot.className='inv-slot';slot.textContent=item;invGrid.appendChild(slot);
});

// Chat system
const chatLog=document.getElementById('chat-log');
const chatInput=document.getElementById('chat-input');
let chatFilter='all';

function addChat(msg,type='game',name=''){
  const div=document.createElement('div');div.className='chat-msg chat-'+type;
  div.dataset.type=type;
  if(name)div.innerHTML=`<span class="name" style="color:${type==='npc'?'#ff9':type==='public'?'#99f':'#fff'}">${name}: </span>${msg}`;
  else div.innerHTML=msg;
  chatLog.appendChild(div);
  chatLog.scrollTop=chatLog.scrollHeight;
  applyFilter();
}

function applyFilter(){
  chatLog.querySelectorAll('.chat-msg').forEach(m=>{
    m.style.display=(chatFilter==='all'||m.dataset.type===chatFilter)?'':'none';
  });
}

document.querySelectorAll('.chat-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.chat-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    chatFilter=tab.dataset.tab;
    applyFilter();
  });
});

chatInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&chatInput.value.trim()){
    addChat(chatInput.value,'public','You');
    chatInput.value='';
  }
});

addChat('Welcome to Lumbridge! ☀️','game');
addChat('Use click to move. Click NPCs to talk.','game');
addChat('Tip: The Maid Café is new in town...','game');

// Periodic "buying gf" chat
let buyingGfTimer=0;
function buyingGfChat(){
  addChat('buying gf 10k','public','n00bsl4y3r');
}

// Dialog system
const dlgBox=document.getElementById('dialog-box');
const dlgName=document.getElementById('dlg-name');
const dlgText=document.getElementById('dlg-text');
const dlgOpts=document.getElementById('dlg-opts');
let currentDialog=null;

function showDialog(npc,index=0){
  const d=npc.userData.dialog[index];
  if(!d){dlgBox.style.display='none';currentDialog=null;return}
  currentDialog=npc;
  dlgName.textContent=npc.userData.name;
  dlgText.textContent=d.text;
  dlgOpts.innerHTML='';
  d.options.forEach(opt=>{
    const btn=document.createElement('div');btn.className='opt';btn.textContent=opt.text;
    btn.addEventListener('click',()=>{
      if(opt.next===-1){dlgBox.style.display='none';currentDialog=null;addChat(`"${opt.text}"`,'npc','You')}
      else showDialog(npc,opt.next);
    });
    dlgOpts.appendChild(btn);
  });
  dlgBox.style.display='block';
}

// ─── MINIMAP ───
const mmCanvas=document.getElementById('minimap-canvas');
const mmCtx=mmCanvas.getContext('2d');
function drawMinimap(){
  mmCtx.fillStyle='#1a2a0a';mmCtx.fillRect(0,0,160,160);
  const scale=1.5;const cx=80,cy=80;
  const px=player.position.x,pz=player.position.z;
  
  // River
  mmCtx.fillStyle='#1a5a8a';
  mmCtx.fillRect(cx+(25-px-4)*scale,0,8*scale,160);
  
  // Buildings
  const blds=[
    {x:0,z:-15,w:16,d:12,c:'#888'},
    {x:-15,z:8,w:7,d:5,c:'#777'},
    {x:15,z:-10,w:6,d:8,c:'#777'},
    {x:-20,z:-10,w:5,d:5,c:'#777'},
    {x:-10,z:10,w:6,d:5,c:'#ff69b4'}
  ];
  blds.forEach(b=>{
    mmCtx.fillStyle=b.c;
    mmCtx.fillRect(cx+(b.x-b.w/2-px)*scale,cy+(b.z-b.d/2-pz)*scale,b.w*scale,b.d*scale);
  });
  
  // Trees
  treePositions.forEach(t=>{
    mmCtx.fillStyle='#2a5a1a';
    mmCtx.beginPath();mmCtx.arc(cx+(t[0]-px)*scale,cy+(t[1]-pz)*scale,3,0,Math.PI*2);mmCtx.fill();
  });
  
  // NPCs
  npcs.forEach(n=>{
    mmCtx.fillStyle='#ff0';
    mmCtx.fillRect(cx+(n.position.x-px)*scale-2,cy+(n.position.z-pz)*scale-2,4,4);
  });
  
  // Player
  mmCtx.fillStyle='#fff';
  mmCtx.beginPath();mmCtx.arc(cx,cy,3,0,Math.PI*2);mmCtx.fill();
  mmCtx.strokeStyle='#fff';mmCtx.lineWidth=1;
  mmCtx.beginPath();mmCtx.moveTo(cx,cy-5);mmCtx.lineTo(cx-3,cy+3);mmCtx.lineTo(cx+3,cy+3);mmCtx.closePath();mmCtx.stroke();
  
  // Border circle clip
  mmCtx.globalCompositeOperation='destination-in';
  mmCtx.beginPath();mmCtx.arc(80,80,78,0,Math.PI*2);mmCtx.fill();
  mmCtx.globalCompositeOperation='source-over';
}

// ─── RAYCASTING / INTERACTION ───
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);

renderer.domElement.addEventListener('click',(e)=>{
  if(currentDialog)return;
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  
  // Check NPC clicks
  for(const npc of npcs){
    const hits=raycaster.intersectObjects(npc.children,true);
    if(hits.length>0){
      // Walk to NPC first, then talk
      playerTarget=npc.position.clone();
      playerTarget.talkTo=npc;
      showMarker(npc.position.x,npc.position.z);
      return;
    }
  }
  
  // Ground click
  const pt=new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane,pt);
  if(pt){
    playerTarget=pt.clone();
    playerTarget.talkTo=null;
    showMarker(pt.x,pt.z);
  }
});

function showMarker(x,z){
  marker.position.set(x,0.1,z);
  marker.visible=true;
  marker.material.opacity=0.8;
}

// Camera controls
let camAngle=0,camDist=35,camHeight=25;
let isDragging=false,lastMX=0,lastMY=0;

renderer.domElement.addEventListener('mousedown',e=>{if(e.button===2||e.button===1){isDragging=true;lastMX=e.clientX;lastMY=e.clientY}});
window.addEventListener('mouseup',()=>isDragging=false);
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  camAngle+=(e.clientX-lastMX)*0.005;
  camHeight=Math.max(8,Math.min(50,camHeight-(e.clientY-lastMY)*0.1));
  lastMX=e.clientX;lastMY=e.clientY;
});
renderer.domElement.addEventListener('wheel',e=>{camDist=Math.max(10,Math.min(80,camDist+e.deltaY*0.05))});
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());

// ─── ANIMATION ───
setLoad(100,'Ready!');
setTimeout(()=>{document.getElementById('loading').style.opacity=0;setTimeout(()=>document.getElementById('loading').style.display='none',500)},500);

const clock=new THREE.Clock();
let fpsFrames=0,fpsTime=0;
let walkPhase=0;
let buyGfCD=15;

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.getElapsedTime();
  
  // FPS
  fpsFrames++;fpsTime+=dt;
  if(fpsTime>=1){document.getElementById('fps').textContent=fpsFrames;fpsFrames=0;fpsTime=0}
  
  // Water
  waterMat.uniforms.uTime.value=t;
  
  // Player movement
  if(playerTarget){
    const dx=playerTarget.x-player.position.x;
    const dz=playerTarget.z-player.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    const talkDist=playerTarget.talkTo?3:0.5;
    
    if(dist>talkDist){
      const speed=playerSpeed*dt;
      const mx=dx/dist*speed,mz=dz/dist*speed;
      player.position.x+=mx;player.position.z+=mz;
      player.rotation.y=Math.atan2(dx,dz);
      
      // Walk animation
      walkPhase+=dt*8;
      lArm.rotation.x=Math.sin(walkPhase)*0.5;rArm.rotation.x=-Math.sin(walkPhase)*0.5;
      lLeg.rotation.x=-Math.sin(walkPhase)*0.4;rLeg.rotation.x=Math.sin(walkPhase)*0.4;
    } else {
      if(playerTarget.talkTo)showDialog(playerTarget.talkTo);
      playerTarget=null;
      lArm.rotation.x=0;rArm.rotation.x=0;lLeg.rotation.x=0;rLeg.rotation.x=0;
    }
  }
  
  // Marker fade
  if(marker.visible){
    marker.rotation.y+=dt*2;
    marker.material.opacity-=dt*0.3;
    if(marker.material.opacity<=0)marker.visible=false;
  }
  
  // Camera follow
  const camTarget=player.position;
  camera.position.x=camTarget.x+Math.sin(camAngle)*camDist;
  camera.position.z=camTarget.z+Math.cos(camAngle)*camDist;
  camera.position.y=camTarget.y+camHeight;
  camera.lookAt(camTarget.x,camTarget.y+2,camTarget.z);
  
  // NPC idle animations
  npcs.forEach(npc=>{
    const children=npc.children;
    // Gentle bob
    if(children[0])children[0].position.y=2.05+Math.sin(t*2+npc.position.x)*0.03;
  });
  
  // Hans walks in circles
  npcHans.position.x=2+Math.cos(t*0.3)*5;
  npcHans.position.z=8+Math.sin(t*0.3)*5;
  npcHans.rotation.y=t*0.3+Math.PI/2;
  
  // Buying GF timer
  buyGfCD-=dt;
  if(buyGfCD<=0){buyingGfChat();buyGfCD=12+Math.random()*10}
  
  // Billboards
  scene.traverse(obj=>{
    if(obj.userData&&obj.userData.billboard)obj.lookAt(camera.position);
  });
  
  // Flag waving
  castle.traverse(obj=>{
    if(obj.userData&&obj.userData.isFlag){
      const verts2=obj.geometry.attributes.position;
      if(!obj.userData.origPos){
        obj.userData.origPos=verts2.array.slice();
      }
      const orig=obj.userData.origPos;
      for(let i=0;i<verts2.count;i++){
        const ox=orig[i*3];
        verts2.array[i*3+2]=Math.sin(ox*3+t*4)*0.1*(ox+1);
      }
      verts2.needsUpdate=true;
    }
  });
  
  // Particles - dust
  const dPos=dust.geometry.attributes.position;
  for(let i=0;i<dustCount;i++){
    dPos.array[i*3]+=dustVel[i*3]*dt;
    dPos.array[i*3+1]+=dustVel[i*3+1]*dt+Math.sin(t+i)*0.002;
    dPos.array[i*3+2]+=dustVel[i*3+2]*dt;
    if(dPos.array[i*3+1]>16){dPos.array[i*3+1]=1;dPos.array[i*3]=Math.random()*100-50;dPos.array[i*3+2]=Math.random()*100-50}
  }
  dPos.needsUpdate=true;
  
  // Particles - fireflies
  const fPos=flies.geometry.attributes.position;
  for(let i=0;i<flyCount;i++){
    const d2=flyData[i];
    fPos.array[i*3]=d2.cx+Math.sin(t*d2.speed+d2.phase)*d2.radius;
    fPos.array[i*3+1]=1.5+Math.sin(t*0.7+d2.phase)*1.5;
    fPos.array[i*3+2]=d2.cz+Math.cos(t*d2.speed*0.8+d2.phase)*d2.radius;
  }
  fPos.needsUpdate=true;
  flyMat.opacity=0.5+Math.sin(t*3)*0.3;
  
  // Particles - leaves
  const lPos=leaves.geometry.attributes.position;
  for(let i=0;i<leafCount;i++){
    const v=leafVel[i];
    lPos.array[i*3]+=v.vx*dt+Math.sin(t*v.spin+i)*0.02;
    lPos.array[i*3+1]+=v.vy*dt;
    lPos.array[i*3+2]+=v.vz*dt+Math.cos(t*v.spin+i)*0.02;
    if(lPos.array[i*3+1]<0){lPos.array[i*3+1]=10+Math.random()*8;lPos.array[i*3]=Math.random()*60-30;lPos.array[i*3+2]=Math.random()*60-30}
  }
  lPos.needsUpdate=true;
  
  // Neon flicker
  neonPink1.intensity=3+Math.sin(t*8)*0.5;
  neonPink2.intensity=2+Math.sin(t*6+1)*0.3;
  
  // UI updates
  document.getElementById('coords').textContent=`${Math.round(player.position.x)}, ${Math.round(player.position.z)}`;
  
  drawMinimap();
  composer.render();
}

animate();

// Resize
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  composer.setSize(window.innerWidth,window.innerHeight);
});
</script>
